<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ведьма сказала | Солнечное Затмение</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Inter', monospace; background: #000; }
        /* UI — минималистичный */
        .ui { position: absolute; bottom: 0; left: 0; right: 0; z-index: 20; background: linear-gradient(to top, rgba(0,0,0,0.85), transparent); padding: 30px 20px 35px; pointer-events: none; text-align: center; }
        .answer-text { font-size: 20px; font-weight: 400; color: #EEEEFF; text-shadow: 0 0 15px rgba(50,100,200,0.5); max-width: 85%; margin: 0 auto; font-family: monospace; }
        .hint-text { font-size: 11px; color: #88AADD; letter-spacing: 2px; margin-top: 10px; text-transform: uppercase; }
        .category-panel { position: absolute; top: 55px; left: 0; right: 0; display: flex; justify-content: center; gap: 12px; z-index: 20; pointer-events: auto; padding: 0 20px; }
        .category-btn { background: rgba(10,10,20,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(68,102,204,0.5); color: #CCDDEE; padding: 8px 20px; border-radius: 30px; font-size: 13px; cursor: pointer; font-family: monospace; }
        .category-btn.active { background: rgba(68,102,204,0.7); border-color: #88AAFF; color: white; box-shadow: 0 0 15px rgba(68,102,204,0.5); }
        .counter-panel { display: flex; justify-content: center; gap: 24px; margin: 15px auto 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); border-radius: 60px; padding: 5px 24px; width: fit-content; border: 1px solid rgba(68,136,255,0.3); pointer-events: none; }
        .counter-item { display: flex; gap: 6px; font-size: 12px; color: #99AACC; }
        .counter-value { font-weight: 700; font-size: 18px; color: #88AAFF; }
        .action-buttons { position: absolute; bottom: 25px; left: 0; right: 0; display: flex; justify-content: center; gap: 15px; z-index: 20; pointer-events: auto; padding: 0 20px; }
        .action-btn { background: rgba(10,10,20,0.8); backdrop-filter: blur(12px); border: 1px solid rgba(68,136,255,0.6); color: #EEF; padding: 8px 18px; border-radius: 40px; font-size: 13px; cursor: pointer; flex: 1; max-width: 130px; text-align: center; font-family: monospace; }
        .action-btn:active { transform: scale(0.96); background: rgba(68,102,204,0.8); }
        @media (max-width: 600px) { .answer-text { font-size: 16px; } .category-btn { padding: 6px 14px; font-size: 11px; } .action-btn { padding: 7px 12px; font-size: 11px; max-width: 110px; } }
    </style>
</head>
<body>
    <div class="category-panel">
        <button class="category-btn active" data-cat="love">💗 ЛЮБОВЬ</button>
        <button class="category-btn" data-cat="work">⚙️ РАБОТА</button>
        <button class="category-btn" data-cat="money">📊 ДЕНЬГИ</button>
    </div>
    <div class="ui">
        <div class="answer-text" id="answerText">ВЕДЬМА СКАЗАЛА</div>
        <div class="hint-text" id="hintText">КОСНИСЬ ШАРА — ОТКРОЙ ИСТИНУ</div>
        <div class="counter-panel"><div class="counter-item"><span>💗</span><span class="counter-value" id="counterLove">1</span></div>
        <div class="counter-item"><span>⚙️</span><span class="counter-value" id="counterWork">1</span></div>
        <div class="counter-item"><span>📊</span><span class="counter-value" id="counterMoney">1</span></div></div>
    </div>
    <div class="action-buttons">
        <button class="action-btn" id="buyBtn">⭐ КУПИТЬ</button>
        <button class="action-btn" id="shareBtn">📤 ПОДЕЛИТЬСЯ</button>
        <button class="action-btn" id="inviteBtn">👥 ПРИГЛАСИТЬ</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- Telegram ---
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        
        // --- Логика приложения (предсказания, счётчики, рефералы) ---
        const predictions = {
            love: { ru: ["Он напишет, когда захочет. Не жди.", "Сердце знает, но разум сомневается.", "Любовь рядом. Или нет."], en: ["He'll text when he wants.", "Heart knows, mind doubts.", "Love is near. Or not."] },
            work: { ru: ["Начальник заметит. Когда ты будешь в отпуске.", "Идею украдут через неделю.", "Успех близко. Сперва допей отчёт."], en: ["Boss will notice on your vacation.", "Idea will be stolen next week.", "Success is near. Finish report first."] },
            money: { ru: ["Деньги придут. Как налоги, только приятнее.", "Инвестируй в себя. Например, в этот шар.", "Удача рядом. Но не прокути."], en: ["Money will come. Like taxes, but nicer.", "Invest in yourself. Like this orb.", "Luck is near. Don't splurge."] }
        };
        
        let currentLang = 'ru'; let activeCategory = 'love'; let used = { love: 0, work: 0, money: 0 }; let isCasting = false; let currentAnswer = ''; let myReferralCode = 'witch_' + Math.random().toString(36).substr(2, 8);
        const answerText = document.getElementById('answerText'); const hintText = document.getElementById('hintText'); const counterLove = document.getElementById('counterLove'); const counterWork = document.getElementById('counterWork'); const counterMoney = document.getElementById('counterMoney');
        function updateCounters() { counterLove.textContent = 1 - used.love; counterWork.textContent = 1 - used.work; counterMoney.textContent = 1 - used.money; }
        function loadData() { const saved = localStorage.getItem('witch_used'); if (saved) try { used = JSON.parse(saved); } catch(e) {} const lastDate = localStorage.getItem('witch_date'); const today = new Date().toDateString(); if (lastDate !== today) { used = { love: 0, work: 0, money: 0 }; localStorage.setItem('witch_date', today); saveUsed(); } updateCounters(); }
        function saveUsed() { localStorage.setItem('witch_used', JSON.stringify(used)); }
        function getRandomPrediction() { return predictions[activeCategory][currentLang][Math.floor(Math.random() * predictions[activeCategory][currentLang].length)]; }
        function getReferralLink() { const bot = tg?.initDataUnsafe?.user?.username || 'witch_said_bot'; return `https://t.me/${bot}?startapp=${myReferralCode}`; }
        function buyQuestions() { if (tg) { tg.showPopup({ title: '⭐ Купить вопросы', message: '+5 вопросов за 10 Telegram Stars?', buttons: [{ id: 'buy', type: 'default', text: 'Купить' }, { id: 'cancel', type: 'cancel', text: 'Отмена' }] }, (btnId) => { if (btnId === 'buy') { used[activeCategory] = Math.max(0, used[activeCategory] - 5); saveUsed(); updateCounters(); if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success'); hintText.textContent = `✨ +5 вопросов`; setTimeout(() => hintText.textContent = 'КОСНИСЬ ШАРА — ОТКРОЙ ИСТИНУ', 3000); } }); } else { alert('⭐ Покупка через Telegram Stars'); } }
        function sharePrediction() { if (!currentAnswer) { hintText.textContent = 'Сначала получи предсказание'; return; } const text = `🔮 ${currentAnswer} 🔮`; const link = getReferralLink(); if (tg?.openTelegramLink) { tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`); } else { alert(text + '\n' + link); } }
        function inviteFriend() { const link = getReferralLink(); const text = `🧙‍♀️ Загляни в магический шар — первое предсказание бесплатно`; if (tg?.openTelegramLink) { tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`); } else { alert('👥 Пригласить: ' + link); } }
        
        // ========== 3D СЦЕНА ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010110);
        scene.fog = new THREE.FogExp2(0x010110, 0.0015);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 4.0);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);
        
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.1, 0.4, 0.8);
        bloomPass.threshold = 0.05; bloomPass.strength = 1.2; bloomPass.radius = 0.7;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // === 1. ЧЁРНЫЙ ШАР (ЛУНА) ===
        const moonGeometry = new THREE.SphereGeometry(1.0, 256, 256);
        const moonMaterial = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x080010, emissiveIntensity: 0.05, metalness: 0.2, roughness: 0.6 });
        const moon = new THREE.Mesh(moonGeometry, moonMaterial);
        scene.add(moon);
        
        // === 2. КОРОНА — ПРОЦЕДУРНЫЕ ЯЗЫКИ ПЛАМЕНИ (ШЕЙДЕР) ===
        // Цвета категорий для короны
        const coronaColors = {
            love: { base: [1.0, 0.3, 0.5], glow: [1.0, 0.6, 0.8] },
            work: { base: [1.0, 0.6, 0.2], glow: [1.0, 0.8, 0.4] },
            money: { base: [0.3, 1.0, 0.4], glow: [0.6, 1.0, 0.7] }
        };
        let currentCorona = coronaColors.love;
        
        // Шейдер для плотной, хаотичной короны (языки пламени)
        const coronaVertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = 1.0;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        
        const coronaFragmentShader = `
            uniform float uTime;
            uniform vec3 uColorBase;
            uniform vec3 uColorGlow;
            varying vec2 vUv;
            
            void main() {
                vec2 uv = vUv;
                // Искажение UV для создания "лоскутности" короны
                vec2 distortedUv = uv + vec2(
                    sin(uv.y * 30.0 + uTime * 5.0) * 0.08,
                    cos(uv.x * 25.0 - uTime * 4.0) * 0.08
                );
                
                // Анимация "пламени" — несколько слоёв шума
                float flame1 = sin(distortedUv.x * 35.0 - uTime * 8.0) * cos(distortedUv.y * 30.0 + uTime * 6.0);
                float flame2 = sin(distortedUv.y * 45.0 + uTime * 10.0) * cos(distortedUv.x * 40.0 - uTime * 7.0);
                float flame3 = sin((distortedUv.x * 2.0 - distortedUv.y * 1.5) * 20.0 + uTime * 12.0);
                float flame4 = cos((distortedUv.y * 2.0 + distortedUv.x) * 25.0 - uTime * 9.0);
                
                float intensity = (flame1 + flame2 + flame3 + flame4) / 4.0;
                intensity = pow(abs(intensity), 1.2) * 0.9;
                
                // Форма короны: затухание к краям шара и свечение наружу
                float radius = length(uv - 0.5) * 2.0;
                float coronaMask = smoothstep(0.6, 1.3, radius) * (1.0 - smoothstep(1.3, 1.8, radius));
                coronaMask = pow(coronaMask, 1.5) * 1.2;
                
                float final = intensity * coronaMask;
                final = clamp(final, 0.0, 1.0);
                
                // Добавляем мерцающие "вспышки"
                float sparkle = sin(uv.x * 120.0 + uTime * 30.0) * sin(uv.y * 100.0 - uTime * 25.0);
                sparkle = max(0.0, sparkle) * 0.5;
                final += sparkle * 0.6;
                
                vec3 color = mix(uColorBase, uColorGlow, final * 1.5);
                float alpha = final * 0.85;
                
                gl_FragColor = vec4(color, alpha);
            }
        `;
        
        // Создаём большую сферу-оболочку для короны (чуть больше чёрного шара)
        const coronaGeometry = new THREE.SphereGeometry(1.12, 256, 256);
        const coronaMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uColorBase: { value: new THREE.Color(currentCorona.base[0], currentCorona.base[1], currentCorona.base[2]) },
                uColorGlow: { value: new THREE.Color(currentCorona.glow[0], currentCorona.glow[1], currentCorona.glow[2]) }
            },
            vertexShader: coronaVertexShader,
            fragmentShader: coronaFragmentShader,
            transparent: true,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const coronaSphere = new THREE.Mesh(coronaGeometry, coronaMaterial);
        scene.add(coronaSphere);
        
        // === 3. ДОПОЛНИТЕЛЬНЫЕ ЧАСТИЦЫ ДЛЯ ПЛОТНОСТИ (20 000 штук) ===
        let particleSystem = null;
        function createParticles(colorSet) {
            if (particleSystem) scene.remove(particleSystem);
            const count = 20000;
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const r = 1.08 + Math.pow(Math.random(), 1.4) * 0.5;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i*3+2] = r * Math.cos(phi);
                
                const mixVal = Math.random();
                const rCol = colorSet.base[0] * (0.5 + mixVal * 0.8);
                const gCol = colorSet.base[1] * (0.5 + mixVal * 0.8);
                const bCol = colorSet.base[2] * (0.5 + mixVal * 0.8);
                colors[i*3] = rCol;
                colors[i*3+1] = gCol;
                colors[i*3+2] = bCol;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            const mat = new THREE.PointsMaterial({ size: 0.006, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.6 });
            particleSystem = new THREE.Points(geo, mat);
            scene.add(particleSystem);
        }
        createParticles(currentCorona);
        
        // === 4. НЕСКОЛЬКО ЗВЁЗД ДЛЯ ФОНА (2000) ===
        const starCount = 2000;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) { starPos[i*3] = (Math.random() - 0.5) * 120; starPos[i*3+1] = (Math.random() - 0.5) * 70; starPos[i*3+2] = (Math.random() - 0.5) * 50 - 25; }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.07, transparent: true, opacity: 0.45, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // === АНИМАЦИЯ ===
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            coronaMaterial.uniforms.uTime.value = time;
            if (particleSystem) particleSystem.rotation.y = time * 0.02;
            stars.rotation.y = time * 0.003;
            effectComposer.render();
        }
        animate();
        
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); effectComposer.setSize(window.innerWidth, window.innerHeight); });
        
        // === СМЕНА ЦВЕТА КОРОНЫ ПРИ ВЫБОРЕ КАТЕГОРИИ ===
        function updateCoronaColor(category) {
            let col;
            if (category === 'love') col = coronaColors.love;
            else if (category === 'work') col = coronaColors.work;
            else col = coronaColors.money;
            currentCorona = col;
            coronaMaterial.uniforms.uColorBase.value = new THREE.Color(col.base[0], col.base[1], col.base[2]);
            coronaMaterial.uniforms.uColorGlow.value = new THREE.Color(col.glow[0], col.glow[1], col.glow[2]);
            createParticles(col);
        }
        
        function flashEffect() {
            coronaMaterial.uniforms.uTime.value = time + 0.5;
            if (particleSystem) particleSystem.material.opacity = 1.0;
            setTimeout(() => { if (particleSystem) particleSystem.material.opacity = 0.6; }, 350);
        }
        
        async function castSpell() {
            if (isCasting) return;
            if (used[activeCategory] >= 1) { hintText.textContent = '⚠️ Лимит на сегодня. Купи дополнительные вопросы.'; if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error'); return; }
            isCasting = true;
            used[activeCategory]++; saveUsed(); updateCounters();
            flashEffect();
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            hintText.textContent = '🔥 Корона вспыхивает...';
            answerText.innerHTML = '✨';
            await new Promise(r => setTimeout(r, 1100));
            currentAnswer = getRandomPrediction();
            answerText.innerHTML = currentAnswer;
            hintText.textContent = '✨ Предсказание готово ✨';
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            isCasting = false;
        }
        
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const newCat = btn.dataset.cat;
                activeCategory = newCat;
                updateCoronaColor(newCat);
                hintText.textContent = `🎯 СФЕРА: ${btn.innerHTML}`;
                answerText.innerHTML = 'ВЕДЬМА СКАЗАЛА';
            });
        });
        
        window.addEventListener('click', (e) => { if (e.target.classList && (e.target.classList.contains('category-btn') || e.target.classList.contains('action-btn'))) return; castSpell(); });
        document.getElementById('buyBtn').addEventListener('click', buyQuestions);
        document.getElementById('shareBtn').addEventListener('click', sharePrediction);
        document.getElementById('inviteBtn').addEventListener('click', inviteFriend);
        
        loadData();
        if (tg) tg.expand();
        console.log('🔥 Кинематографичная корона (шейдерная) активна');
    </script>
</body>
</html>
