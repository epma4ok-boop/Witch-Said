<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ведьма сказала | 3D Шар Теслы</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: #000; }
        * { -webkit-tap-highlight-color: transparent; }
        
        /* UI поверх 3D */
        .ui {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            z-index: 20;
            pointer-events: none;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            padding: 30px 20px 40px;
        }
        .answer-text {
            font-size: 26px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #aaccff, #ff88cc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(0,0,0,0.5);
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hint-text {
            font-size: 13px;
            color: #ccddff;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }
        .counter-panel {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            font-size: 12px;
            color: #88aaff;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 8px 20px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            pointer-events: none;
        }
        .counter-item {
            display: flex;
            gap: 6px;
            align-items: baseline;
        }
        .counter-label { font-size: 11px; color: #aabbff; }
        .counter-value { font-weight: 700; font-size: 16px; color: #ffaa88; }
        
        .category-panel {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 20;
            pointer-events: auto;
            padding: 0 16px;
        }
        .category-btn {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(100,150,255,0.4);
            color: #ccddff;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            flex: 0 1 auto;
        }
        .category-btn.active {
            background: rgba(100,100,255,0.5);
            border-color: #88aaff;
            color: white;
            box-shadow: 0 0 15px rgba(100,150,255,0.4);
        }
        
        .action-buttons {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 20;
            pointer-events: auto;
            padding: 0 16px;
        }
        .action-btn {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            max-width: 140px;
        }
        .action-btn:active { transform: scale(0.96); background: rgba(100,100,255,0.5); }
        
        .bottom-panel {
            position: absolute;
            bottom: 90px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 20;
        }
        
        @media (max-width: 600px) {
            .answer-text { font-size: 20px; min-height: 80px; }
            .category-btn { padding: 6px 14px; font-size: 12px; }
            .action-btn { padding: 8px 16px; font-size: 12px; max-width: 120px; }
            .counter-panel { padding: 6px 16px; gap: 12px; }
        }
    </style>
</head>
<body>
    <!-- UI элементы -->
    <div class="category-panel">
        <button class="category-btn active" data-cat="love">💗 Любовь</button>
        <button class="category-btn" data-cat="work">💼 Работа</button>
        <button class="category-btn" data-cat="money">💰 Деньги</button>
    </div>
    
    <div class="ui">
        <div class="answer-text" id="answerText">ВЕДЬМА СКАЗАЛА</div>
        <div class="hint-text" id="hintText">КОСНИСЬ ШАРА — ОТКРОЙ ИСТИНУ</div>
        <div class="counter-panel" id="counterPanel">
            <div class="counter-item"><span class="counter-label">💗</span><span class="counter-value" id="counterLove">1</span></div>
            <div class="counter-item"><span class="counter-label">💼</span><span class="counter-value" id="counterWork">1</span></div>
            <div class="counter-item"><span class="counter-label">💰</span><span class="counter-value" id="counterMoney">1</span></div>
        </div>
    </div>
    
    <div class="bottom-panel">
        <div class="action-buttons">
            <button class="action-btn" id="buyBtn">⭐ Купить</button>
            <button class="action-btn" id="shareBtn">📤 Поделиться</button>
            <button class="action-btn" id="inviteBtn">👥 Пригласить</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "postprocessing": "https://unpkg.com/postprocessing@6.35.7/build/index.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'postprocessing';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // ========== TELEGRAM WEBAPP INIT ==========
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor?.('#030318');
            tg.setBackgroundColor?.('#030318');
            console.log('📱 Telegram WebApp готов');
        }
        
        // ========== ЛОГИКА ПРИЛОЖЕНИЯ ==========
        // Предсказания
        const predictions = {
            love: {
                ru: ["🌙 Он напишет, когда закончится интернет. То есть никогда.", "🌙 Твоя любовь — как криптовалюта: то взлёт, то обвал.", "🌙 Отправь ему это предсказание. Если не ответит — порви.", "🌙 Он уже сохранил твой номер как «Магия, осторожно».", "🌙 Совместное будущее есть, но ты будешь мыть посуду."],
                en: ["🌙 He'll text when the internet ends. That is, never.", "🌙 Your love is like crypto: soar or crash.", "🌙 Send him this. If no reply — rip it up.", "🌙 He saved you as 'Magic, careful'.", "🌙 A future exists, but you'll do the dishes."]
            },
            work: {
                ru: ["⚡ Начальник заметит твою работу. Когда ты будешь в отпуске.", "⚡ Повышение дадут тому, кто пьёт с ним кофе.", "⚡ Твоя идея гениальна. Украдут через неделю.", "⚡ Коллеги тайно завидуют. И явно тоже.", "⚡ Успех близко. Но сперва допей этот отчёт."],
                en: ["⚡ Boss will notice your work. When you're on vacation.", "⚡ Promotion goes to whoever drinks coffee with him.", "⚡ Your idea is brilliant. Stolen next week.", "⚡ Colleagues envy. Secretly and openly.", "⚡ Success is near. But first, finish that report."]
            },
            money: {
                ru: ["💰 Деньги придут. Как налоги, только приятнее.", "💰 Твой бюджет худеет. Пора кормить его меньше.", "💰 Крупная покупка опустошит кошелёк. Зато радость.", "💰 Инвестируй в себя. Например, в этот шар.", "💰 Финансовая удача уже рядом. Но не прокути."],
                en: ["💰 Money will come. Like taxes, but nicer.", "💰 Your budget is shrinking. Feed it less.", "💰 A big purchase will empty your wallet. Joy remains.", "💰 Invest in yourself. For example, this orb.", "💰 Financial luck is near. Don't splurge."]
            }
        };
        
        // Состояние
        let currentLang = 'ru';
        let activeCategory = 'love';
        let used = { love: 0, work: 0, money: 0 };
        let isCasting = false;
        let currentAnswer = '';
        let referrerId = null;
        let myReferralCode = 'witch_' + Math.random().toString(36).substr(2, 8);
        
        // DOM элементы
        const answerText = document.getElementById('answerText');
        const hintText = document.getElementById('hintText');
        const counterLove = document.getElementById('counterLove');
        const counterWork = document.getElementById('counterWork');
        const counterMoney = document.getElementById('counterMoney');
        const buyBtn = document.getElementById('buyBtn');
        const shareBtn = document.getElementById('shareBtn');
        const inviteBtn = document.getElementById('inviteBtn');
        const categoryBtns = document.querySelectorAll('.category-btn');
        
        // Функции
        function updateCounters() {
            counterLove.textContent = 1 - used.love;
            counterWork.textContent = 1 - used.work;
            counterMoney.textContent = 1 - used.money;
        }
        
        function loadData() {
            const saved = localStorage.getItem('witch_used');
            if (saved) {
                try { used = JSON.parse(saved); } catch(e) {}
            }
            const lastDate = localStorage.getItem('witch_date');
            const today = new Date().toDateString();
            if (lastDate !== today) {
                used = { love: 0, work: 0, money: 0 };
                localStorage.setItem('witch_date', today);
                saveUsed();
            }
            updateCounters();
        }
        
        function saveUsed() {
            localStorage.setItem('witch_used', JSON.stringify(used));
        }
        
        function getRandomPrediction() {
            const arr = predictions[activeCategory][currentLang];
            return arr[Math.floor(Math.random() * arr.length)];
        }
        
        function getCategoryName() {
            const names = { love: 'Любовь', work: 'Работа', money: 'Деньги' };
            return names[activeCategory];
        }
        
        // Реферальная механика
        function getReferralLink() {
            const botUsername = tg?.initDataUnsafe?.user?.username || 'witch_said_bot';
            return `https://t.me/${botUsername}?startapp=${myReferralCode}`;
        }
        
        function addReferralBonus() {
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('startapp');
            if (ref && ref !== myReferralCode) {
                used[activeCategory] = Math.max(0, used[activeCategory] - 1);
                saveUsed();
                updateCounters();
                hintText.textContent = '✨ Кто-то пришёл по твоей ссылке! +1 вопрос ✨';
                setTimeout(() => {
                    hintText.textContent = 'Коснись шара — открой истину';
                }, 3000);
            }
        }
        
        // Покупка вопросов (Telegram Stars)
        function buyQuestions() {
            if (tg) {
                tg.showPopup({
                    title: '⭐ Магазин вопросов',
                    message: 'Купить 5 дополнительных вопросов за 10 Telegram Stars?',
                    buttons: [{ id: 'buy', type: 'default', text: 'Купить' }, { id: 'cancel', type: 'cancel', text: 'Отмена' }]
                }, (btnId) => {
                    if (btnId === 'buy') {
                        const cat = activeCategory;
                        used[cat] = Math.max(0, used[cat] - 5);
                        saveUsed();
                        updateCounters();
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                        hintText.textContent = `✨ +5 вопросов для категории ${getCategoryName()} ✨`;
                        setTimeout(() => {
                            if (hintText) hintText.textContent = 'Коснись шара — открой истину';
                        }, 3000);
                    }
                });
            } else {
                alert('⭐ Покупка вопросов через Telegram Stars');
            }
        }
        
        // Поделиться предсказанием
        function sharePrediction() {
            if (!currentAnswer) {
                hintText.textContent = 'Сначала получи предсказание!';
                return;
            }
            const text = `🔮 ${currentAnswer} 🔮\n\n✨ Ведьма сказала — магический шар судьбы ✨`;
            const link = getReferralLink();
            if (tg?.openTelegramLink) {
                tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`);
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            } else {
                alert(text + '\n\n' + link);
            }
        }
        
        // Пригласить друга
        function inviteFriend() {
            const link = getReferralLink();
            const text = `🧙‍♀️ Загляни в магический шар «Ведьма сказала»! Первый вопрос бесплатно ✨`;
            if (tg?.openTelegramLink) {
                tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`);
            } else {
                alert('👥 Пригласи друга: ' + link);
            }
        }
        
        // ========== 3D СЦЕНА (Шар + Корона + Молнии) ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x030318);
        scene.fog = new THREE.FogExp2(0x030318, 0.006);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 4.5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);
        
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.3, 0.4, 0.85);
        bloomPass.threshold = 0.08;
        bloomPass.strength = 1.0;
        bloomPass.radius = 0.8;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // Шар
        const geometry = new THREE.SphereGeometry(1.0, 128, 128);
        const material = new THREE.MeshPhysicalMaterial({
            color: 0x88aaff, emissive: 0x111133, emissiveIntensity: 0.4,
            metalness: 0.92, roughness: 0.22, clearcoat: 1.0, clearcoatRoughness: 0.12,
            reflectivity: 0.55, iridescence: 0.9, iridescenceIOR: 1.35,
            transparent: true, opacity: 0.88, side: THREE.DoubleSide
        });
        const sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);
        
        const glowMaterial = new THREE.MeshBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.3, side: THREE.BackSide });
        const glowSphere = new THREE.Mesh(new THREE.SphereGeometry(1.05, 64, 64), glowMaterial);
        scene.add(glowSphere);
        
        // Корона (кольца)
        const coronaRings = [];
        for (let i = 0; i < 3; i++) {
            const ringGeo = new THREE.TorusGeometry(1.18 + i * 0.07, 0.012, 64, 200);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa88, emissive: 0xff6644, emissiveIntensity: 0.5 + i * 0.2, transparent: true, opacity: 0.4 + i * 0.2, side: THREE.DoubleSide, blending: THREE.AdditiveBlending });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            scene.add(ring);
            coronaRings.push(ring);
        }
        
        // Лучи
        const rays = [];
        for (let i = 0; i < 48; i++) {
            const angle = (i / 48) * Math.PI * 2;
            const dir = new THREE.Vector3(Math.cos(angle), Math.sin(angle), 0);
            const len = 0.45 + Math.random() * 0.25;
            const points = [new THREE.Vector3(dir.x * 1.1, dir.y * 1.1, 0), new THREE.Vector3(dir.x * (1.1 + len), dir.y * (1.1 + len), 0)];
            const rayGeo = new THREE.BufferGeometry().setFromPoints(points);
            const rayMat = new THREE.LineBasicMaterial({ color: new THREE.Color().setHSL(0.12, 1.0, 0.6), transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
            const rayLine = new THREE.Line(rayGeo, rayMat);
            scene.add(rayLine);
            rays.push({ line: rayLine, angle, speed: 0.5 + Math.random() * 2 });
        }
        
        // Молнии
        let lightningLines = [];
        function generateLightning() {
            const startPhi = Math.random() * Math.PI * 2;
            const startTheta = Math.acos(2 * Math.random() - 1);
            const start = new THREE.Vector3(Math.sin(startTheta) * Math.cos(startPhi), Math.sin(startTheta) * Math.sin(startPhi), Math.cos(startTheta)).multiplyScalar(0.95);
            const endPhi = startPhi + (Math.random() - 0.5) * 1.2;
            const endTheta = startTheta + (Math.random() - 0.5) * 1.0;
            const end = new THREE.Vector3(Math.sin(endTheta) * Math.cos(endPhi), Math.sin(endTheta) * Math.sin(endPhi), Math.cos(endTheta)).multiplyScalar(0.9);
            const mid = start.clone().add(end).multiplyScalar(0.5).add(new THREE.Vector3((Math.random() - 0.5) * 0.45, (Math.random() - 0.5) * 0.45, (Math.random() - 0.5) * 0.45)).normalize().multiplyScalar(0.93);
            const points = [start, mid, end];
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineBasicMaterial({ color: new THREE.Color().setHSL(0.55 + Math.random() * 0.15, 1.0, 0.68), transparent: true, opacity: 0.65, blending: THREE.AdditiveBlending });
            return new THREE.Line(geo, mat);
        }
        for (let i = 0; i < 12; i++) { const l = generateLightning(); scene.add(l); lightningLines.push(l); }
        setInterval(() => {
            lightningLines.forEach(l => scene.remove(l));
            lightningLines = [];
            for (let i = 0; i < 14; i++) { const l = generateLightning(); scene.add(l); lightningLines.push(l); }
        }, 1700);
        
        // Частицы
        const particleCount = 1000;
        const particleGeo = new THREE.BufferGeometry();
        const posArray = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const r = Math.random() ** 1.4 * 1.18;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            posArray[i*3] = r * Math.sin(phi) * Math.cos(theta);
            posArray[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            posArray[i*3+2] = r * Math.cos(phi);
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particles = new THREE.Points(particleGeo, new THREE.PointsMaterial({ color: 0x99bbff, size: 0.007, transparent: true, blending: THREE.AdditiveBlending }));
        scene.add(particles);
        
        // Анимация
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            material.emissiveIntensity = 0.4 + Math.sin(time * 2.2) * 0.1;
            glowMaterial.opacity = 0.28 + Math.sin(time * 1.8) * 0.08;
            coronaRings.forEach((ring, i) => { ring.rotation.z = time * 0.25; const s = 1 + Math.sin(time * 3 + i) * 0.03; ring.scale.set(s, s, s); if (ring.material) ring.material.emissiveIntensity = 0.6 + Math.sin(time * 3) * 0.25; });
            rays.forEach(ray => { if (ray.line.material) { const f = 0.4 + Math.sin(time * ray.speed * 3) * 0.3; ray.line.material.opacity = 0.35 + f * 0.5; if (Math.random() > 0.98) ray.line.material.color.setHSL((time * 0.12 + ray.angle) % 1, 1.0, 0.65); } });
            lightningLines.forEach((line, idx) => { if (line.material) { line.material.color.setHSL(0.55 + Math.sin(time * 1.5 + idx) * 0.18, 1.0, 0.68); line.material.opacity = 0.55 + Math.sin(time * 3 + idx) * 0.3; } });
            particles.rotation.y = time * 0.12;
            particles.rotation.x = Math.sin(time * 0.28) * 0.12;
            sphere.rotation.y = time * 0.07;
            glowSphere.rotation.y = time * 0.07;
            effectComposer.render();
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Визуальная вспышка при нажатии
        function flashEffect() {
            material.emissiveIntensity = 1.1;
            coronaRings.forEach(ring => { if (ring.material) ring.material.emissiveIntensity = 1.2; });
            setTimeout(() => {
                material.emissiveIntensity = 0.45;
                coronaRings.forEach(ring => { if (ring.material) ring.material.emissiveIntensity = 0.6; });
            }, 250);
            lightningLines.forEach(l => scene.remove(l));
            lightningLines = [];
            for (let i = 0; i < 14; i++) { const l = generateLightning(); scene.add(l); lightningLines.push(l); }
        }
        
        // Обработка клика по шару
        async function castSpell() {
            if (isCasting) return;
            if (used[activeCategory] >= 1) {
                hintText.textContent = '⚠️ Бесплатный вопрос использован. Купи дополнительные. ⭐';
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                return;
            }
            isCasting = true;
            used[activeCategory]++;
            saveUsed();
            updateCounters();
            flashEffect();
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            hintText.textContent = '🌑 Корона вспыхивает...';
            answerText.innerHTML = '✨';
            
            await new Promise(r => setTimeout(r, 1100));
            
            currentAnswer = getRandomPrediction();
            answerText.innerHTML = currentAnswer;
            hintText.textContent = '✨ Вот что сказала ведьма ✨';
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            isCasting = false;
        }
        
        // Смена категории
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeCategory = btn.dataset.cat;
                hintText.textContent = `🔮 Выбрана сфера: ${btn.innerHTML}`;
                answerText.innerHTML = 'ВЕДЬМА СКАЗАЛА';
            });
        });
        
        // Обработчики кнопок
        window.addEventListener('click', (e) => {
            if (e.target.classList && (e.target.classList.contains('category-btn') || e.target.classList.contains('action-btn'))) return;
            castSpell();
        });
        
        buyBtn.addEventListener('click', buyQuestions);
        shareBtn.addEventListener('click', sharePrediction);
        inviteBtn.addEventListener('click', inviteFriend);
        
        // Инициализация
        loadData();
        addReferralBonus();
        if (tg) tg.expand();
        
        console.log('🌟 3D Шар Теслы с Telegram WebApp готов!');
