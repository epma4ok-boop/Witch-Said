<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ведьма сказала | Солнечное затмение</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: white;
        }
        
        /* ---------- UI ПОВЕРХ 3D ---------- */
        .ui {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 20;
            background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.4) 60%, transparent);
            padding: 30px 20px 35px;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }
        
        /* Заголовок и ответ */
        .answer-area {
            text-align: center;
            margin-bottom: 20px;
            min-height: 100px;
        }
        .answer-text {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #FFD89B, #FF8C8C, #B28BFF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(255,200,100,0.3);
            line-height: 1.4;
            max-width: 90%;
            margin: 0 auto;
        }
        .hint-text {
            font-size: 13px;
            color: #FFDDBB;
            letter-spacing: 2px;
            margin-top: 12px;
            opacity: 0.8;
        }
        
        /* Категории — КРУПНЫЕ, СВЕТЯЩИЕСЯ */
        .category-panel {
            position: absolute;
            top: 70px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 16px;
            z-index: 20;
            pointer-events: auto;
            padding: 0 20px;
        }
        .category-btn {
            background: rgba(10, 5, 25, 0.8);
            backdrop-filter: blur(12px);
            border: 1.5px solid rgba(255, 160, 80, 0.6);
            color: #FFEECC;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            text-shadow: 0 0 6px rgba(0,0,0,0.5);
            flex: 0 1 auto;
            min-width: 110px;
            letter-spacing: 1px;
        }
        .category-btn.active {
            background: linear-gradient(135deg, rgba(255, 120, 60, 0.9), rgba(255, 70, 100, 0.9));
            border-color: #FFDDBB;
            color: white;
            box-shadow: 0 0 25px rgba(255, 100, 50, 0.6);
            text-shadow: 0 0 4px rgba(0,0,0,0.3);
        }
        .category-btn:active { transform: scale(0.96); }
        
        /* Счётчики вопросов */
        .counter-panel {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin: 15px auto 10px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(15px);
            border-radius: 80px;
            padding: 8px 28px;
            width: fit-content;
            border: 1px solid rgba(255,180,100,0.3);
            pointer-events: none;
        }
        .counter-item {
            display: flex;
            gap: 8px;
            align-items: baseline;
            font-size: 14px;
            font-weight: 500;
        }
        .counter-label { color: #FFCC99; }
        .counter-value { font-weight: 800; font-size: 22px; color: #FFAA66; text-shadow: 0 0 5px #FF6600; margin-left: 4px; }
        
        /* КНОПКИ ДЕЙСТВИЙ — БОЛЬШИЕ, ЯРКИЕ */
        .action-buttons {
            position: absolute;
            bottom: 25px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 18px;
            z-index: 20;
            pointer-events: auto;
            padding: 0 20px;
        }
        .action-btn {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            border: 1.5px solid rgba(255, 140, 70, 0.7);
            color: #FFF2E6;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            max-width: 150px;
            text-align: center;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .action-btn:active { transform: scale(0.96); background: rgba(255, 100, 50, 0.7); border-color: #FFEEDD; color: white; }
        
        /* Адаптив */
        @media (max-width: 600px) {
            .answer-text { font-size: 18px; }
            .category-btn { padding: 8px 16px; font-size: 13px; min-width: 80px; }
            .action-btn { padding: 10px 14px; font-size: 13px; max-width: 120px; }
            .counter-panel { gap: 18px; padding: 5px 18px; }
            .counter-value { font-size: 18px; }
        }
    </style>
</head>
<body>

    <!-- Кнопки категорий -->
    <div class="category-panel">
        <button class="category-btn active" data-cat="love">💗 Любовь</button>
        <button class="category-btn" data-cat="work">💼 Работа</button>
        <button class="category-btn" data-cat="money">💰 Деньги</button>
    </div>
    
    <!-- Основной UI -->
    <div class="ui">
        <div class="answer-area">
            <div class="answer-text" id="answerText">ВЕДЬМА СКАЗАЛА</div>
            <div class="hint-text" id="hintText">КОСНИСЬ ШАРА — ОТКРОЙ ИСТИНУ</div>
        </div>
        <div class="counter-panel">
            <div class="counter-item"><span class="counter-label">💗</span><span class="counter-value" id="counterLove">1</span></div>
            <div class="counter-item"><span class="counter-label">💼</span><span class="counter-value" id="counterWork">1</span></div>
            <div class="counter-item"><span class="counter-label">💰</span><span class="counter-value" id="counterMoney">1</span></div>
        </div>
    </div>
    
    <div class="action-buttons">
        <button class="action-btn" id="buyBtn">⭐ Купить</button>
        <button class="action-btn" id="shareBtn">📤 Поделиться</button>
        <button class="action-btn" id="inviteBtn">👥 Пригласить</button>
    </div>

    <!-- Импорт Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // ---------- TELEGRAM WEBAPP ----------
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        
        // ---------- ЛОГИКА ПРИЛОЖЕНИЯ ----------
        const predictions = {
            love: {
                ru: ["🌙 Он напишет, когда закончится интернет. То есть никогда.", "🌙 Твоя любовь — как криптовалюта: то взлёт, то обвал.", "🌙 Отправь ему это предсказание. Если не ответит — порви.", "🌙 Он уже сохранил твой номер как «Магия, осторожно».", "🌙 Совместное будущее есть, но ты будешь мыть посуду."],
                en: ["🌙 He'll text when the internet ends. That is, never.", "🌙 Your love is like crypto: soar or crash.", "🌙 Send him this. If no reply — rip it up.", "🌙 He saved you as 'Magic, careful'.", "🌙 A future exists, but you'll do the dishes."]
            },
            work: {
                ru: ["⚡ Начальник заметит твою работу. Когда ты будешь в отпуске.", "⚡ Повышение дадут тому, кто пьёт с ним кофе.", "⚡ Твоя идея гениальна. Украдут через неделю.", "⚡ Коллеги тайно завидуют. И явно тоже.", "⚡ Успех близко. Но сперва допей этот отчёт."],
                en: ["⚡ Boss will notice your work. When you're on vacation.", "⚡ Promotion goes to whoever drinks coffee with him.", "⚡ Your idea is brilliant. Stolen next week.", "⚡ Colleagues envy. Secretly and openly.", "⚡ Success is near. But first, finish that report."]
            },
            money: {
                ru: ["💰 Деньги придут. Как налоги, только приятнее.", "💰 Твой бюджет худеет. Пора кормить его меньше.", "💰 Крупная покупка опустошит кошелёк. Зато радость.", "💰 Инвестируй в себя. Например, в этот шар.", "💰 Финансовая удача уже рядом. Но не прокути."],
                en: ["💰 Money will come. Like taxes, but nicer.", "💰 Your budget is shrinking. Feed it less.", "💰 A big purchase will empty your wallet. Joy remains.", "💰 Invest in yourself. For example, this orb.", "💰 Financial luck is near. Don't splurge."]
            }
        };
        
        let currentLang = 'ru';
        let activeCategory = 'love';
        let used = { love: 0, work: 0, money: 0 };
        let isCasting = false;
        let currentAnswer = '';
        let myReferralCode = 'witch_' + Math.random().toString(36).substr(2, 8);
        
        // DOM элементы
        const answerText = document.getElementById('answerText');
        const hintText = document.getElementById('hintText');
        const counterLove = document.getElementById('counterLove');
        const counterWork = document.getElementById('counterWork');
        const counterMoney = document.getElementById('counterMoney');
        const buyBtn = document.getElementById('buyBtn');
        const shareBtn = document.getElementById('shareBtn');
        const inviteBtn = document.getElementById('inviteBtn');
        const categoryBtns = document.querySelectorAll('.category-btn');
        
        function updateCounters() {
            counterLove.textContent = 1 - used.love;
            counterWork.textContent = 1 - used.work;
            counterMoney.textContent = 1 - used.money;
        }
        
        function loadData() {
            const saved = localStorage.getItem('witch_used');
            if (saved) try { used = JSON.parse(saved); } catch(e) {}
            const lastDate = localStorage.getItem('witch_date');
            const today = new Date().toDateString();
            if (lastDate !== today) {
                used = { love: 0, work: 0, money: 0 };
                localStorage.setItem('witch_date', today);
                saveUsed();
            }
            updateCounters();
        }
        
        function saveUsed() { localStorage.setItem('witch_used', JSON.stringify(used)); }
        function getRandomPrediction() { return predictions[activeCategory][currentLang][Math.floor(Math.random() * predictions[activeCategory][currentLang].length)]; }
        function getCategoryName() { const names = { love: 'Любовь', work: 'Работа', money: 'Деньги' }; return names[activeCategory]; }
        function getReferralLink() { const botUsername = tg?.initDataUnsafe?.user?.username || 'witch_said_bot'; return `https://t.me/${botUsername}?startapp=${myReferralCode}`; }
        
        function buyQuestions() {
            if (tg) {
                tg.showPopup({
                    title: '⭐ Магазин вопросов',
                    message: 'Купить 5 дополнительных вопросов за 10 Telegram Stars?',
                    buttons: [{ id: 'buy', type: 'default', text: 'Купить' }, { id: 'cancel', type: 'cancel', text: 'Отмена' }]
                }, (btnId) => {
                    if (btnId === 'buy') {
                        used[activeCategory] = Math.max(0, used[activeCategory] - 5);
                        saveUsed(); updateCounters();
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                        hintText.textContent = `✨ +5 вопросов для категории ${getCategoryName()} ✨`;
                        setTimeout(() => { if (hintText) hintText.textContent = 'Коснись шара — открой истину'; }, 3000);
                    }
                });
            } else { alert('⭐ Покупка вопросов через Telegram Stars'); }
        }
        
        function sharePrediction() {
            if (!currentAnswer) { hintText.textContent = 'Сначала получи предсказание!'; return; }
            const text = `🔮 ${currentAnswer} 🔮\n\n✨ Ведьма сказала — магический шар судьбы ✨`;
            const link = getReferralLink();
            if (tg?.openTelegramLink) { tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`); if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); } 
            else { alert(text + '\n\n' + link); }
        }
        
        function inviteFriend() {
            const link = getReferralLink();
            const text = `🧙‍♀️ Загляни в магический шар «Ведьма сказала»! Первый вопрос бесплатно ✨`;
            if (tg?.openTelegramLink) { tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`); } 
            else { alert('👥 Пригласи друга: ' + link); }
        }
        
        // ========== 3D СЦЕНА — ТОЛЬКО СОЛНЕЧНОЕ ЗАТМЕНИЕ ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020210);
        scene.fog = new THREE.FogExp2(0x020210, 0.004);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 4.2);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.3;
        document.body.appendChild(renderer.domElement);
        
        // Пост-эффекты (Bloom)
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.8);
        bloomPass.threshold = 0.05;
        bloomPass.strength = 1.2;
        bloomPass.radius = 0.7;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // === ОСНОВНОЙ ШАР (ТЁМНЫЙ, СТЕКЛЯННЫЙ) ===
        const geometry = new THREE.SphereGeometry(1.0, 128, 128);
        const material = new THREE.MeshPhysicalMaterial({
            color: 0x331144,
            emissive: 0x220033,
            emissiveIntensity: 0.25,
            metalness: 0.85,
            roughness: 0.35,
            clearcoat: 0.95,
            clearcoatRoughness: 0.2,
            reflectivity: 0.6,
            iridescence: 0.95,
            iridescenceIOR: 1.4,
            transparent: true,
            opacity: 0.92
        });
        const sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);
        
        // === КОРОНА — ПУЛЬСИРУЮЩИЕ КОЛЬЦА ===
        const coronas = [];
        const colors = [0xff8844, 0xff6644, 0xff4488, 0xaa66ff];
        for (let i = 0; i < 4; i++) {
            const ringGeo = new THREE.TorusGeometry(1.12 + i * 0.06, 0.012, 128, 300);
            const ringMat = new THREE.MeshStandardMaterial({
                color: colors[i % colors.length],
                emissive: 0xff4422,
                emissiveIntensity: 0.55 - i * 0.08,
                transparent: true,
                opacity: 0.45 - i * 0.07,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            scene.add(ring);
            coronas.push(ring);
        }
        
        // === ЛУЧИ ЗАТМЕНИЯ (НЕОНОВЫЕ) ===
        const rayLines = [];
        const rayCount = 56;
        for (let i = 0; i < rayCount; i++) {
            const angle = (i / rayCount) * Math.PI * 2;
            const dirX = Math.cos(angle);
            const dirY = Math.sin(angle);
            const lengthVar = 0.5 + Math.random() * 0.4;
            const points = [
                new THREE.Vector3(dirX * 1.08, dirY * 1.08, 0),
                new THREE.Vector3(dirX * (1.08 + lengthVar), dirY * (1.08 + lengthVar), (Math.random() - 0.5) * 0.2)
            ];
            const rayGeo = new THREE.BufferGeometry().setFromPoints(points);
            const hue = 0.08 + (i / rayCount) * 0.2; // золотисто-красный диапазон
            const rayMat = new THREE.LineBasicMaterial({
                color: new THREE.Color().setHSL(hue, 1.0, 0.65),
                transparent: true,
                opacity: 0.55,
                blending: THREE.AdditiveBlending
            });
            const rayLine = new THREE.Line(rayGeo, rayMat);
            scene.add(rayLine);
            rayLines.push({ line: rayLine, baseHue: hue, speed: 0.4 + Math.random() * 1.5 });
        }
        
        // === МЕЛКИЕ СВЕТЯЩИЕСЯ ЧАСТИЦЫ (ЗВЁЗДНАЯ ПЫЛЬ) ===
        const dustCount = 1800;
        const dustGeo = new THREE.BufferGeometry();
        const dustPositions = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            const r = 1.25 + Math.random() * 0.45;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            dustPositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
            dustPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            dustPositions[i*3+2] = r * Math.cos(phi);
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        const dustMat = new THREE.PointsMaterial({ color: 0xffaa66, size: 0.006, transparent: true, blending: THREE.AdditiveBlending });
        const dust = new THREE.Points(dustGeo, dustMat);
        scene.add(dust);
        
        // === АНИМАЦИЯ ===
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012;
            
            // Пульсация короны
            coronas.forEach((ring, idx) => {
                const pulse = 1 + Math.sin(time * 2.2 + idx) * 0.035;
                ring.scale.set(pulse, pulse, pulse);
                if (ring.material) ring.material.emissiveIntensity = 0.55 + Math.sin(time * 2 + idx) * 0.25;
            });
            
            // Мерцание и смена оттенков лучей
            rayLines.forEach(ray => {
                if (ray.line.material) {
                    const flick = 0.45 + Math.sin(time * ray.speed * 2.5) * 0.25;
                    ray.line.material.opacity = 0.5 + flick * 0.4;
                    const hueShift = (time * 0.1) % 0.3;
                    ray.line.material.color.setHSL(ray.baseHue + hueShift, 1.0, 0.65);
                }
            });
            
            // Медленное вращение частиц и шара
            dust.rotation.y = time * 0.08;
            dust.rotation.x = Math.sin(time * 0.2) * 0.1;
            sphere.rotation.y = time * 0.05;
            
            effectComposer.render();
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // === ВСПЫШКА ПРИ НАЖАТИИ ===
        function flashEffect() {
            material.emissiveIntensity = 0.8;
            coronas.forEach(ring => { if (ring.material) ring.material.emissiveIntensity = 1.2; });
            setTimeout(() => {
                material.emissiveIntensity = 0.25;
                coronas.forEach(ring => { if (ring.material) ring.material.emissiveIntensity = 0.55; });
            }, 300);
        }
        
        // === ПОЛУЧЕНИЕ ПРЕДСКАЗАНИЯ ===
        async function castSpell() {
            if (isCasting) return;
            if (used[activeCategory] >= 1) {
                hintText.textContent = '⚠️ Бесплатный вопрос использован. Купи дополнительные. ⭐';
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                return;
            }
            isCasting = true;
            used[activeCategory]++;
            saveUsed();
            updateCounters();
            flashEffect();
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            hintText.textContent = '🌘 Корона затмения вспыхивает...';
            answerText.innerHTML = '✨';
            
            await new Promise(r => setTimeout(r, 1100));
            currentAnswer = getRandomPrediction();
            answerText.innerHTML = currentAnswer;
            hintText.textContent = '✨ Вот что сказала ведьма ✨';
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            isCasting = false;
        }
        
        // === СОБЫТИЯ КНОПОК ===
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeCategory = btn.dataset.cat;
                hintText.textContent = `🔮 Выбрана сфера: ${btn.innerHTML}`;
                answerText.innerHTML = 'ВЕДЬМА СКАЗАЛА';
            });
        });
        
        window.addEventListener('click', (e) => {
            if (e.target.classList && (e.target.classList.contains('category-btn') || e.target.classList.contains('action-btn'))) return;
            castSpell();
        });
        
        buyBtn.addEventListener('click', buyQuestions);
        shareBtn.addEventListener('click', sharePrediction);
        inviteBtn.addEventListener('click', inviteFriend);
        
        loadData();
        if (tg) tg.expand();
        console.log('🌞 Солнечное затмение активно');
    </script>
</body>
</html>
