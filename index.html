<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>Ведьма сказала | Шар солнечного затмения</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a1a;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Фон с глубокими звёздами */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, #1a1030 0%, #0a0a1a 60%, #050108 100%);
      z-index: -2;
    }
    .stars {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: starTwinkle 4s ease-in-out infinite;
    }
    @keyframes starTwinkle {
      0%, 100% { opacity: 0; transform: scale(0.3); }
      50% { opacity: 0.6; transform: scale(1); }
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 16px 32px;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* Шапка */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }
    .title-section { flex: 1; }
    .badge {
      font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; color: #00aaff;
      font-weight: 500; margin-bottom: 8px;
      text-shadow: 0 0 5px #00aaff;
    }
    .main-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-weight: 600;
      background: linear-gradient(135deg, #fff, #ffaa88, #ff66aa, #aa88ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.2;
    }
    .lang-switch {
      display: flex; gap: 6px;
      background: rgba(0,0,0,0.5);
      padding: 4px; border-radius: 60px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .lang {
      border: none; background: transparent;
      color: #ccddee; font-size: 11px; font-weight: 600;
      padding: 6px 12px; border-radius: 60px;
      cursor: pointer;
    }
    .lang.active { background: rgba(0, 150, 255, 0.5); color: white; text-shadow: 0 0 4px #00aaff; }

    /* Карточка шара */
    .magic-card {
      background: linear-gradient(135deg, rgba(0,0,0,0.5), rgba(15,8,30,0.6));
      border-radius: 56px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 20px;
      padding: 24px 20px;
    }

    /* ----- Шар «Солнечное затмение» ----- */
    .orb-container {
      position: relative;
      width: 260px;
      height: 260px;
      margin: 0 auto 16px;
      cursor: pointer;
    }

    /* Тёмный шар (луна) */
    .orb-shape {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, 
        #111 0%, 
        #1a1a2e 30%, 
        #0a0a1a 70%, 
        #000000 100%);
      box-shadow: 
        0 0 0 2px rgba(255, 255, 255, 0.2),
        0 20px 40px rgba(0, 0, 0, 0.8),
        inset 0 -10px 20px rgba(0, 0, 0, 0.8);
      transition: transform 0.2s;
      z-index: 2;
    }
    .orb-shape:active { transform: scale(0.97); }

    /* Яркое пульсирующее кольцо и лучи (корона затмения) */
    .orb-glow {
      position: absolute;
      top: -15%;
      left: -15%;
      width: 130%;
      height: 130%;
      border-radius: 50%;
      background: radial-gradient(circle, 
        rgba(255, 200, 100, 0) 40%,
        rgba(255, 100, 50, 0.3) 50%,
        rgba(255, 50, 100, 0.4) 60%,
        rgba(100, 50, 255, 0.3) 70%,
        rgba(0, 100, 255, 0.2) 80%,
        transparent 95%);
      filter: blur(8px);
      animation: eclipseGlow 3s infinite alternate;
      pointer-events: none;
      z-index: 1;
    }
    /* Добавляем разноцветные "лучи" */
    .orb-glint {
      position: absolute;
      top: -20%;
      left: -20%;
      width: 140%;
      height: 140%;
      border-radius: 50%;
      background: repeating-conic-gradient(from 0deg, 
        #ff3366 0deg 15deg, 
        #ffaa33 15deg 30deg, 
        #33ffaa 30deg 45deg, 
        #33aaff 45deg 60deg, 
        #aa33ff 60deg 75deg,
        #ff33aa 75deg 90deg);
      mask: radial-gradient(circle, transparent 35%, black 55%, transparent 70%);
      -webkit-mask: radial-gradient(circle, transparent 35%, black 55%, transparent 70%);
      opacity: 0.6;
      animation: rotateGlint 12s infinite linear;
      pointer-events: none;
      z-index: 1;
    }
    /* Свечение при нажатии */
    .orb-shape.casting ~ .orb-glow {
      animation: castEclipse 0.5s ease-out;
    }
    .orb-shape.casting {
      animation: castPulse 0.6s ease-in-out;
    }

    @keyframes eclipseGlow {
      0% { opacity: 0.5; filter: blur(10px); transform: scale(1); }
      100% { opacity: 1; filter: blur(15px); transform: scale(1.05); background: radial-gradient(circle, rgba(255, 200, 100, 0) 30%, rgba(255, 100, 50, 0.5) 50%, rgba(255, 50, 100, 0.6) 65%, rgba(100, 50, 255, 0.5) 75%, rgba(0, 100, 255, 0.4) 85%, transparent 95%); }
    }
    @keyframes rotateGlint {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes castPulse {
      0% { transform: scale(1); }
      50% { transform: scale(0.98); filter: brightness(1.2); }
      100% { transform: scale(1); }
    }
    @keyframes castEclipse {
      0% { opacity: 0.6; filter: blur(12px); transform: scale(1); }
      50% { opacity: 1; filter: blur(5px); transform: scale(1.2); background: radial-gradient(circle, rgba(255,255,200,0.4) 30%, rgba(255,150,100,0.8) 50%, #ff66aa 65%, #aa88ff 80%, transparent 95%); }
      100% { opacity: 0.7; filter: blur(10px); transform: scale(1.05); }
    }

    /* Текст внутри шара (на тёмном фоне) */
    .orb-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 700;
      color: #ffeedd;
      text-shadow: 0 0 8px #ffaa66, 0 0 12px #ff3366;
      padding: 20px;
      z-index: 10;
      pointer-events: none;
    }
    .orb-line {
      display: block;
      opacity: 0;
      transform: translateY(10px);
      animation: lineAppear 0.35s forwards;
      max-width: 85%;
      margin: 2px auto;
      font-size: clamp(14px, 5vw, 22px);
      line-height: 1.3;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      border-radius: 40px;
      padding: 4px 8px;
    }
    @keyframes lineAppear {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Плавающие искры (солнечные частицы) */
    .particle-spark {
      position: absolute;
      width: 4px;
      height: 4px;
      background: radial-gradient(circle, #ffaa66, #ff3366);
      border-radius: 50%;
      filter: blur(1px);
      animation: floatSpark 3s infinite ease-in-out;
      opacity: 0;
      pointer-events: none;
      z-index: 5;
      box-shadow: 0 0 6px #ffaa66;
    }
    @keyframes floatSpark {
      0% { transform: translateY(0) scale(0.5); opacity: 0; }
      20% { opacity: 0.9; transform: scale(1); }
      80% { opacity: 0.6; transform: translateY(-25px) scale(0.8); }
      100% { transform: translateY(-40px) scale(0); opacity: 0; }
    }

    .witch-message {
      font-size: 13px;
      color: #ddccff;
      text-align: center;
      padding: 10px 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 60px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      max-width: 280px;
      margin: 0 auto;
      box-shadow: 0 0 10px rgba(0,100,255,0.3);
    }

    /* Категории, кнопки и пр. — без изменений, но с небольшим редизайном */
    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .chip {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,150,100,0.4);
      border-radius: 40px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      color: #ffddcc;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
      flex: 1;
      text-align: center;
    }
    .chip.active {
      background: linear-gradient(135deg, rgba(255,100,50,0.4), rgba(255,50,100,0.3));
      border-color: #ffaa66;
      color: white;
      box-shadow: 0 0 15px #ff884d;
    }

    .limits {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      background: rgba(0,0,0,0.5);
      border-radius: 60px;
      padding: 12px 16px;
    }
    .limit-label { font-size: 11px; color: #aaaaff; }
    .limit-value { font-size: 16px; font-weight: 700; color: #ffaa66; text-shadow: 0 0 4px #ff6644; }

    .btn {
      border: none;
      padding: 12px 20px;
      border-radius: 60px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      flex: 1;
      text-align: center;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #ff884d, #ff3366);
      color: white;
      box-shadow: 0 4px 15px rgba(255,68,68,0.3);
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-secondary {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,150,100,0.5);
      color: white;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #7799cc;
      margin-top: 16px;
    }

    /* Заставка */
    .splash {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #050108;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease;
    }
    .splash.hide { opacity: 0; visibility: hidden; }
    .splash-orb {
      width: 100px; height: 100px;
      background: radial-gradient(circle, #ffaa66, #ff3366, #550033);
      border-radius: 50%;
      animation: splashPulse 1s infinite alternate;
      box-shadow: 0 0 40px #ff6644;
    }
    @keyframes splashPulse {
      0% { transform: scale(1); opacity: 0.7; }
      100% { transform: scale(1.2); opacity: 1; }
    }
    .splash-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; margin-top: 20px;
      background: linear-gradient(135deg, #fff, #ffaa88);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .splash-progress {
      width: 200px; height: 2px;
      background: rgba(255,100,50,0.3);
      margin-top: 20px;
    }
    .splash-progress-bar {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, #ff884d, #ff3366);
    }
  </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="stars" id="stars"></div>

<div class="splash" id="splash">
  <div class="splash-content">
    <div class="splash-orb"></div>
    <div class="splash-title">СОЛНЕЧНОЕ ЗАТМЕНИЕ<br>ВЕДЬМА СКАЗАЛА</div>
    <div class="splash-progress"><div class="splash-progress-bar" id="progressBar"></div></div>
  </div>
</div>

<div class="container" id="app">
  <div class="header">
    <div class="title-section">
      <div class="badge">🌞 КОРОНАЛЬНЫЙ ШАР</div>
      <h1 class="main-title">Коснись затмения —<br>узнаешь ответ</h1>
    </div>
    <div class="lang-switch">
      <button class="lang active" data-lang="ru">RU</button>
      <button class="lang" data-lang="en">EN</button>
    </div>
  </div>

  <div class="magic-card">
    <div class="orb-container" id="orbContainer">
      <div class="orb-shape" id="orbShape"></div>
      <div class="orb-glow"></div>
      <div class="orb-glint"></div>
      <div class="orb-text" id="orbText">🔮</div>
      <!-- Магические частицы -->
      <div class="particle-spark" style="bottom: 15%; left: 10%; animation-delay: 0s;"></div>
      <div class="particle-spark" style="bottom: 25%; left: 85%; animation-delay: 1.2s;"></div>
      <div class="particle-spark" style="bottom: 60%; left: 8%; animation-delay: 0.7s;"></div>
      <div class="particle-spark" style="bottom: 70%; left: 88%; animation-delay: 2.5s;"></div>
    </div>
    <div class="witch-message" id="witchLine">Коснись короны затмения, выбери тему</div>
  </div>

  <div class="chip-group">
    <button class="chip active" data-key="love">💗 Любовь</button>
    <button class="chip" data-key="work">💼 Работа</button>
    <button class="chip" data-key="money">💰 Деньги</button>
  </div>

  <div class="limits">
    <div class="limit-item"><div class="limit-label">💗 Любовь</div><div class="limit-value" id="limitLove">1</div></div>
    <div class="limit-item"><div class="limit-label">💼 Работа</div><div class="limit-value" id="limitWork">1</div></div>
    <div class="limit-item"><div class="limit-label">💰 Деньги</div><div class="limit-value" id="limitMoney">1</div></div>
  </div>

  <div class="btn-row">
    <button id="buyBtn" class="btn btn-secondary">⭐ Купить вопросы</button>
    <button id="inviteBtn" class="btn btn-secondary">👥 Пригласить</button>
  </div>
  <div class="btn-row">
    <button id="shareBtn" class="btn btn-primary">📤 Поделиться</button>
    <button id="againBtn" class="btn btn-secondary" style="display: none;">🎭 Другой ответ</button>
  </div>

  <div class="footer">Магия внутри. Нажми — корона засияет</div>
</div>

<script>
  (function() {
    // DOM элементы
    const splash = document.getElementById('splash');
    const app = document.getElementById('app');
    const orbShape = document.getElementById('orbShape');
    const orbText = document.getElementById('orbText');
    const witchLine = document.getElementById('witchLine');
    const shareBtn = document.getElementById('shareBtn');
    const againBtn = document.getElementById('againBtn');
    const buyBtn = document.getElementById('buyBtn');
    const inviteBtn = document.getElementById('inviteBtn');
    const chips = document.querySelectorAll('.chip');
    const limitLove = document.getElementById('limitLove');
    const limitWork = document.getElementById('limitWork');
    const limitMoney = document.getElementById('limitMoney');
    const progressBar = document.getElementById('progressBar');

    // Состояние
    let currentLang = 'ru';
    let activeCategory = 'love';
    let used = { love: 0, work: 0, money: 0 };
    let currentAnswer = '';
    let isCasting = false;

    // Предсказания (оставим для краткости, как в прошлый раз)
    const predictions = {
      love: { ru: ["💗 Он напишет, когда закончится интернет. То есть никогда.", "💗 Вы будете вместе, если научишься терпеть его музыку.", "💗 Твоя любовь как криптовалюта: то взлетает, то обвал."], en: ["💗 He'll text when the internet ends.", "💗 You'll be together if you tolerate his music.", "💗 Your love is like crypto."] },
      work: { ru: ["💼 Начальник заметит твою работу. Когда ты будешь в отпуске.", "💼 Повышение дадут тому, кто пьёт с ним кофе.", "💼 Твоя идея гениальна. Украдут через неделю."], en: ["💼 The boss will notice your work when you're on vacation.", "💼 Promotion goes to whoever drinks coffee with him.", "💼 Your idea is brilliant. It'll be stolen."] },
      money: { ru: ["💰 Деньги придут неожиданно. Как налоги, только приятнее.", "💰 Твой бюджет худеет. Пора кормить его меньше.", "💰 Крупная покупка опустошит кошелёк. Зато будет радость."], en: ["💰 Money will come unexpectedly.", "💰 Your budget is shrinking. Feed it less.", "💰 A big purchase will empty your wallet. But joy remains."] }
    };
    function getRandomPrediction(cat) { const arr = predictions[cat][currentLang]; return arr[Math.floor(Math.random() * arr.length)]; }
    function showAnswer(text) {
      const words = text.split(' ');
      const lines = []; let current = '';
      for (let w of words) { if ((current + ' ' + w).length > 20 && current) { lines.push(current); current = w; } else { current = current ? current + ' ' + w : w; } }
      if (current) lines.push(current);
      orbText.innerHTML = lines.map(l => `<span class="orb-line">${l}</span>`).join('');
    }

    async function castSpell() {
      if (isCasting) return;
      if (used[activeCategory] >= 1) { witchLine.textContent = '⚠️ Бесплатный вопрос использован. Купи дополнительные. ⭐'; return; }
      isCasting = true;
      used[activeCategory]++;
      localStorage.setItem('witch_used', JSON.stringify(used));
      updateLimits();

      orbShape.classList.add('casting');
      witchLine.textContent = '🌞 Корона вспыхивает...';
      orbText.innerHTML = '✨';

      await new Promise(r => setTimeout(r, 1200));

      currentAnswer = getRandomPrediction(activeCategory);
      showAnswer(currentAnswer);
      witchLine.textContent = '✨ Вот что сказала ведьма ✨';
      orbShape.classList.remove('casting');
      againBtn.style.display = 'block';
      shareBtn.dataset.text = currentAnswer;
      isCasting = false;
    }

    function updateLimits() { limitLove.textContent = 1 - used.love; limitWork.textContent = 1 - used.work; limitMoney.textContent = 1 - used.money; }
    function loadData() {
      const saved = localStorage.getItem('witch_used');
      if (saved) { try { used = JSON.parse(saved); } catch(e) {} }
      const lastDate = localStorage.getItem('witch_date');
      const today = new Date().toDateString();
      if (lastDate !== today) { used = { love: 0, work: 0, money: 0 }; localStorage.setItem('witch_date', today); saveUsed(); }
      updateLimits();
    }
    function saveUsed() { localStorage.setItem('witch_used', JSON.stringify(used)); }
    function shareAnswer() { const text = shareBtn.dataset.text || currentAnswer; if (window.Telegram?.WebApp?.openTelegramLink) { window.Telegram.WebApp.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent('https://t.me/place_bot')}&text=${encodeURIComponent('🌞 ' + text + ' 🌞')}`); } else { alert('🌞 ' + text); } }
    function anotherAnswer() { if (!isCasting && used[activeCategory] < 1) castSpell(); }
    function buyQuestions() { alert('⭐ Покупка вопросов через Telegram Stars\nСкоро появится!'); }
    function inviteFriend() { alert('👥 Пригласи друга:\nhttps://t.me/place_bot?start=ref'); }

    document.getElementById('orbContainer').addEventListener('click', castSpell);
    shareBtn.addEventListener('click', shareAnswer);
    againBtn.addEventListener('click', anotherAnswer);
    buyBtn.addEventListener('click', buyQuestions);
    inviteBtn.addEventListener('click', inviteFriend);
    chips.forEach(chip => { chip.addEventListener('click', () => { chips.forEach(c => c.classList.remove('active')); chip.classList.add('active'); activeCategory = chip.dataset.key; witchLine.textContent = `🔮 Выбрана сфера: ${chip.textContent.trim()}`; againBtn.style.display = 'none'; orbText.innerHTML = '🌞'; }); });
    document.querySelectorAll('.lang').forEach(btn => { btn.addEventListener('click', () => { const newLang = btn.dataset.lang; if (newLang === currentLang) return; currentLang = newLang; document.querySelectorAll('.lang').forEach(b => b.classList.remove('active')); btn.classList.add('active'); orbText.innerHTML = '🌞'; witchLine.textContent = 'Коснись короны затмения'; }); });

    let progress = 0;
    const interval = setInterval(() => { progress += Math.random() * 15 + 5; if (progress >= 100) { progress = 100; clearInterval(interval); progressBar.style.width = '100%'; setTimeout(() => { splash.classList.add('hide'); setTimeout(() => { splash.style.display = 'none'; if (window.Telegram?.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); } }, 600); }, 400); } progressBar.style.width = progress + '%'; }, 150);
    for (let i = 0; i < 80; i++) { const star = document.createElement('div'); star.className = 'star'; star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%'; star.style.width = Math.random() * 2 + 1 + 'px'; star.style.animationDelay = Math.random() * 5 + 's'; document.getElementById('stars').appendChild(star); }
    loadData(); orbText.innerHTML = '🌞';
  })();
</script>
</body>
</html>
