<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0515" />
  <title>Ведьма сказала | Магический шар судьбы</title>
  <meta name="description" content="Премиум гадание на магическом шаре. Ведьма знает ответ." />
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #05030b;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ===== ЗАСТАВКА ===== */
    .splash-screen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: radial-gradient(ellipse at 30% 20%, #1a0f2e 0%, #05030b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease, visibility 0s linear 0.8s;
      backdrop-filter: blur(10px);
    }
    .splash-screen.hide {
      opacity: 0;
      visibility: hidden;
    }
    .splash-content {
      text-align: center;
      animation: fadeInScale 1.2s ease-out;
    }
    @keyframes fadeInScale {
      0% { opacity: 0; transform: scale(0.85); filter: blur(8px); }
      100% { opacity: 1; transform: scale(1); filter: blur(0); }
    }
    .splash-logo {
      width: 140px;
      height: 140px;
      margin: 0 auto 24px;
      animation: floatLogo 3s ease-in-out infinite;
    }
    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .splash-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #d4b8ff, #b26bff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }
    .splash-sub {
      font-size: 13px;
      color: #a590c2;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .splash-progress {
      width: 200px;
      height: 2px;
      background: rgba(178, 107, 255, 0.2);
      border-radius: 4px;
      margin: 32px auto 0;
      overflow: hidden;
    }
    .splash-progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #b26bff, #ff7ac2);
      border-radius: 4px;
      transition: width 0.2s ease;
    }

    /* ===== ОСНОВНОЕ ПРИЛОЖЕНИЕ ===== */
    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 560px;
      margin: 0 auto;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .app.visible {
      opacity: 1;
    }

    /* Фоновые эффекты */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; background: white; border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.6; transform: scale(1); }
    }
    .smoke-layer {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(circle at 20% 40%, rgba(100, 50, 150, 0.12) 0%, transparent 60%);
      filter: blur(40px);
      animation: drift 20s ease-in-out infinite;
    }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(2%, 1%) scale(1.05); }
    }

    /* Header с ведьмой */
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 2;
    }
    .hero-section { flex: 1; }
    .hero-kicker {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #b26bff;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 600;
      background: linear-gradient(135deg, #fff, #d4b8ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* Реалистичная ведьма */
    .witch-portrait {
      width: 64px;
      height: 64px;
      background: linear-gradient(145deg, #2a1a3a, #0d0520);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      border: 1px solid rgba(178, 107, 255, 0.4);
      box-shadow: 0 0 20px rgba(178, 107, 255, 0.2);
      transition: all 0.3s;
    }
    .witch-portrait:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(178, 107, 255, 0.4); }
    .witch-face {
      font-size: 32px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
      position: relative;
    }
    .witch-eyes {
      position: absolute;
      top: 28px;
      left: 18px;
      display: flex;
      gap: 12px;
    }
    .witch-eye {
      width: 6px;
      height: 6px;
      background: #ffddaa;
      border-radius: 50%;
      animation: blink 4s infinite;
    }
    @keyframes blink {
      0%, 48%, 52%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.1); }
    }
    .witch-cloak {
      position: absolute;
      bottom: -4px;
      width: 100%;
      height: 8px;
      background: radial-gradient(ellipse, #4a2a6a, transparent);
      border-radius: 50%;
      filter: blur(2px);
      animation: cloakSway 3s ease-in-out infinite;
    }
    @keyframes cloakSway {
      0%, 100% { transform: translateX(0); opacity: 0.6; }
      50% { transform: translateX(3px); opacity: 1; }
    }

    .lang-switch {
      display: flex;
      gap: 4px;
      background: rgba(18, 12, 32, 0.6);
      padding: 4px;
      border-radius: 60px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .lang {
      border: none;
      background: transparent;
      color: #a590c2;
      font-size: 11px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 60px;
      cursor: pointer;
    }
    .lang.active {
      background: rgba(178, 107, 255, 0.25);
      color: white;
    }

    /* Магическая карточка */
    .orb-card {
      position: relative;
      background: linear-gradient(135deg, rgba(20, 12, 36, 0.7), rgba(10, 5, 20, 0.8));
      border-radius: 48px;
      padding: 28px 20px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 25px 45px -15px rgba(0,0,0,0.5);
    }
    .orb-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .orb-container {
      position: relative;
      width: min(260px, 70vw);
      height: min(260px, 70vw);
    }
    .orb-stage {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .orb-stage:active { transform: scale(0.96); }
    .orb {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff, #f3e0ff, #c88bff, #5a2a8a, #1a0a2a);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.15), 0 30px 50px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
      transition: background 0.5s;
    }
    .orb::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 25% 25%, rgba(255,255,255,0.5) 0%, transparent 60%);
    }
    .orb-text {
      position: absolute;
      inset: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      color: #1a052a;
      text-shadow: 0 0 8px rgba(255,255,255,0.9);
      z-index: 2;
      font-size: clamp(16px, 4.8vw, 34px);
      line-height: 1.15;
    }
    .orb-line {
      display: block;
      opacity: 0;
      transform: translateY(10px);
      animation: lineReveal 0.35s forwards;
    }
    @keyframes lineReveal {
      to { opacity: 1; transform: translateY(0); }
    }
    .witch-line {
      font-size: 13px;
      color: #b9a9d9;
      text-align: center;
      padding: 8px 16px;
      background: rgba(10,5,20,0.6);
      border-radius: 60px;
      backdrop-filter: blur(12px);
      max-width: 280px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 12px 0 8px;
    }
    .chip {
      background: rgba(18, 12, 32, 0.7);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 40px;
      padding: 8px 18px;
      font-size: 13px;
      color: #a590c2;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chip.active {
      background: rgba(178, 107, 255, 0.25);
      border-color: #b26bff;
      color: white;
      box-shadow: 0 0 15px rgba(178,107,255,0.3);
    }
    .btn {
      border: none;
      padding: 14px 20px;
      border-radius: 60px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #b26bff, #8b3fdf);
      color: white;
      box-shadow: 0 4px 15px rgba(178,107,255,0.4);
    }
    .btn-secondary {
      background: rgba(18,12,32,0.8);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
    }
    .history-section {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .history-title {
      font-size: 11px;
      color: #7a6a99;
      margin-bottom: 10px;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .history-item {
      background: rgba(10,5,20,0.4);
      border-radius: 20px;
      padding: 8px 12px;
      font-size: 12px;
      color: #b9a9d9;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
    }
    .clear-history {
      font-size: 10px;
      color: #7a6a99;
      text-align: right;
      margin-top: 8px;
      cursor: pointer;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(178,107,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      border-radius: 48px;
    }
    .overlay.show { opacity: 1; }
    .stage.casting .orb { animation: castPulse 0.8s infinite; }
    @keyframes castPulse {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.02); filter: brightness(1.15); }
    }
    .footer-note {
      text-align: center;
      font-size: 11px;
      color: #7a6a99;
      margin-top: 16px;
    }
  </style>
</head>
<body>

<!-- ЗАСТАВКА -->
<div class="splash-screen" id="splash">
  <div class="splash-content">
    <div class="splash-logo">
      <svg width="140" height="140" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" stroke="url(#grad)" stroke-width="1.5" fill="none" stroke-dasharray="4 4"/>
        <path d="M50 20 L58 40 L80 42 L63 56 L68 78 L50 66 L32 78 L37 56 L20 42 L42 40 L50 20Z" fill="url(#grad2)" opacity="0.8"/>
        <text x="50" y="88" text-anchor="middle" fill="white" font-size="8" font-family="monospace">✦</text>
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#b26bff"/>
            <stop offset="100%" stop-color="#ff7ac2"/>
          </linearGradient>
          <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#b26bff"/>
            <stop offset="100%" stop-color="#ff7ac2"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="splash-title">ВЕДЬМА СКАЗАЛА</div>
    <div class="splash-sub">MAGIC ORACLE</div>
    <div class="splash-progress">
      <div class="splash-progress-bar" id="progressBar"></div>
    </div>
  </div>
</div>

<!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
<div class="app" id="app">
  <div class="stars" id="stars"></div>
  <div class="smoke-layer"></div>

  <header class="app-header">
    <div class="hero-section">
      <div class="hero-kicker" data-i18n="heroKicker">Шар судьбы</div>
      <h1 class="hero-title" data-i18n="heroText">Коснись —<br>узнаешь ответ</h1>
    </div>
    <div class="witch-portrait" id="witchPortrait">
      <div class="witch-face">🧙</div>
      <div class="witch-eyes">
        <div class="witch-eye"></div>
        <div class="witch-eye"></div>
      </div>
      <div class="witch-cloak"></div>
    </div>
    <div class="lang-switch">
      <button class="lang active" data-lang="ru">RU</button>
      <button class="lang" data-lang="en">EN</button>
    </div>
  </header>

  <div class="orb-card" id="stage">
    <div class="orb-wrapper">
      <div class="orb-container">
        <div class="orb-stage" id="orbStage">
          <div class="orb" id="orb"></div>
          <div class="orb-text" id="orbText"></div>
        </div>
      </div>
      <div class="witch-line" id="witchLine">Нажми на шар...</div>
    </div>
    <div class="overlay" id="overlay"></div>
  </div>

  <div class="controls">
    <div class="chips">
      <button class="chip active" data-key="all">✨ Всё</button>
      <button class="chip" data-key="love">💗 Любовь</button>
      <button class="chip" data-key="work">💼 Работа</button>
      <button class="chip" data-key="money">💰 Деньги</button>
    </div>

    <div class="actions">
      <button id="shareBtn" class="btn btn-primary">📤 Поделиться</button>
      <button id="againBtn" class="btn btn-secondary" style="display: none;">🎭 Другой ответ</button>
    </div>

    <div class="history-section" id="historySection" style="display: none;">
      <div class="history-title">📜 Свиток пророчеств</div>
      <div class="history-list" id="historyList"></div>
      <div class="clear-history" id="clearHistory">🗑️ Очистить</div>
    </div>

    <div class="footer-note" data-i18n="footerNote">Магия внутри. Нажми — и шар заговорит</div>
  </div>
</div>

<script src="app.js"></script>
<script>
  // Генерация звёзд
  for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.width = Math.random() * 2 + 1 + 'px';
    star.style.height = star.style.width;
    star.style.animationDelay = Math.random() * 5 + 's';
    star.style.animationDuration = 2 + Math.random() * 4 + 's';
    document.getElementById('stars').appendChild(star);
  }
</script>
</body>
</html>
