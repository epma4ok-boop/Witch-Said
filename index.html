<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ведьма сказала | Оракул</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: black;
            color: white;
        }
        /* Строгий, минималистичный UI поверх 3D */
        .ui {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 20;
            background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.4) 60%, transparent);
            padding: 30px 20px 35px;
            backdrop-filter: blur(8px);
            pointer-events: none;
            font-family: monospace;
            letter-spacing: 1px;
        }
        .answer-area {
            text-align: center;
            margin-bottom: 20px;
            min-height: 90px;
        }
        .answer-text {
            font-size: 20px;
            font-weight: 400;
            color: #EEEEFF;
            text-shadow: 0 0 10px rgba(68, 136, 255, 0.5);
            line-height: 1.4;
            max-width: 85%;
            margin: 0 auto;
            font-family: monospace;
        }
        .hint-text {
            font-size: 12px;
            color: #88AADD;
            letter-spacing: 2px;
            margin-top: 8px;
            text-transform: uppercase;
        }
        
        /* Панель категорий — хай-тек минимализм */
        .category-panel {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 20;
            pointer-events: auto;
            padding: 0 20px;
        }
        .category-btn {
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(68, 102, 204, 0.5);
            color: #CCDDEE;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: monospace;
            letter-spacing: 1px;
        }
        .category-btn.active {
            background: rgba(68, 102, 204, 0.7);
            border-color: #88AAFF;
            color: white;
            box-shadow: 0 0 12px rgba(68, 102, 204, 0.6);
        }
        
        /* Счётчики вопросов */
        .counter-panel {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 12px auto 8px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 6px 24px;
            width: fit-content;
            border: 1px solid rgba(68, 136, 255, 0.3);
            pointer-events: none;
        }
        .counter-item {
            display: flex;
            gap: 6px;
            align-items: baseline;
            font-size: 12px;
            color: #99AACC;
        }
        .counter-value {
            font-weight: 700;
            font-size: 18px;
            color: #88AAFF;
        }
        
        /* Кнопки действий — строгие, но заметные */
        .action-buttons {
            position: absolute;
            bottom: 25px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 20;
            pointer-events: auto;
            padding: 0 20px;
        }
        .action-btn {
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(68, 136, 255, 0.6);
            color: #EEF;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            max-width: 130px;
            text-align: center;
            font-family: monospace;
        }
        .action-btn:active { transform: scale(0.96); background: rgba(68, 102, 204, 0.8); border-color: #AACCFF; color: white; }
        
        @media (max-width: 600px) {
            .answer-text { font-size: 16px; }
            .category-btn { padding: 6px 14px; font-size: 11px; }
            .action-btn { padding: 7px 12px; font-size: 11px; max-width: 110px; }
        }
    </style>
</head>
<body>

    <!-- Элементы управления -->
    <div class="category-panel">
        <button class="category-btn active" data-cat="love">💙 Любовь</button>
        <button class="category-btn" data-cat="work">⚙️ Работа</button>
        <button class="category-btn" data-cat="money">📊 Деньги</button>
    </div>
    
    <div class="ui">
        <div class="answer-area">
            <div class="answer-text" id="answerText">ВЕДЬМА СКАЗАЛА</div>
            <div class="hint-text" id="hintText">НАЖМИ НА ШАР — УЗНАЙ БУДУЩЕЕ</div>
        </div>
        <div class="counter-panel">
            <div class="counter-item"><span>💙</span><span class="counter-value" id="counterLove">1</span></div>
            <div class="counter-item"><span>⚙️</span><span class="counter-value" id="counterWork">1</span></div>
            <div class="counter-item"><span>📊</span><span class="counter-value" id="counterMoney">1</span></div>
        </div>
    </div>
    
    <div class="action-buttons">
        <button class="action-btn" id="buyBtn">⭐ Купить</button>
        <button class="action-btn" id="shareBtn">📤 Поделиться</button>
        <button class="action-btn" id="inviteBtn">👥 Пригласить</button>
    </div>

    <!-- Импорт модулей Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- Telegram WebApp ---
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        
        // --- Логика приложения ---
        const predictions = {
            love: {
                ru: ["Он напишет, когда захочет. Не жди.", "Сердце знает, но разум сомневается.", "Не ищи любовь, она сама найдёт тебя. Или нет."],
                en: ["He'll text when he wants. Don't wait.", "Heart knows, but mind doubts.", "Don't look for love, it will find you. Or not."]
            },
            work: {
                ru: ["Начальник заметит твою работу. Когда ты будешь в отпуске.", "Твоя идея гениальна. Украдут через неделю.", "Успех близко. Но сперва допей этот отчёт."],
                en: ["The boss will notice your work. When you're on vacation.", "Your idea is brilliant. Stolen next week.", "Success is near. First, finish the report."]
            },
            money: {
                ru: ["Деньги придут. Как налоги, только приятнее.", "Инвестируй в себя. Например, в этот шар.", "Финансовая удача уже рядом. Но не прокути."],
                en: ["Money will come. Like taxes, but nicer.", "Invest in yourself. For example, this orb.", "Financial luck is near. Don't splurge."]
            }
        };
        
        let currentLang = 'ru';
        let activeCategory = 'love';
        let used = { love: 0, work: 0, money: 0 };
        let isCasting = false;
        let currentAnswer = '';
        let myReferralCode = 'witch_' + Math.random().toString(36).substr(2, 8);
        
        // DOM элементы
        const answerText = document.getElementById('answerText');
        const hintText = document.getElementById('hintText');
        const counterLove = document.getElementById('counterLove');
        const counterWork = document.getElementById('counterWork');
        const counterMoney = document.getElementById('counterMoney');
        const buyBtn = document.getElementById('buyBtn');
        const shareBtn = document.getElementById('shareBtn');
        const inviteBtn = document.getElementById('inviteBtn');
        const categoryBtns = document.querySelectorAll('.category-btn');
        
        function updateCounters() {
            counterLove.textContent = 1 - used.love;
            counterWork.textContent = 1 - used.work;
            counterMoney.textContent = 1 - used.money;
        }
        
        function loadData() {
            const saved = localStorage.getItem('witch_used');
            if (saved) try { used = JSON.parse(saved); } catch(e) {}
            const lastDate = localStorage.getItem('witch_date');
            const today = new Date().toDateString();
            if (lastDate !== today) {
                used = { love: 0, work: 0, money: 0 };
                localStorage.setItem('witch_date', today);
                saveUsed();
            }
            updateCounters();
        }
        function saveUsed() { localStorage.setItem('witch_used', JSON.stringify(used)); }
        function getRandomPrediction() { return predictions[activeCategory][currentLang][Math.floor(Math.random() * predictions[activeCategory][currentLang].length)]; }
        function getCategoryName() { const names = { love: 'Любовь', work: 'Работа', money: 'Деньги' }; return names[activeCategory]; }
        function getReferralLink() { const botUsername = tg?.initDataUnsafe?.user?.username || 'witch_said_bot'; return `https://t.me/${botUsername}?startapp=${myReferralCode}`; }
        
        function buyQuestions() {
            if (tg) {
                tg.showPopup({
                    title: '⭐ Купить вопросы',
                    message: '+5 вопросов за 10 Telegram Stars?',
                    buttons: [{ id: 'buy', type: 'default', text: 'Купить' }, { id: 'cancel', type: 'cancel', text: 'Отмена' }]
                }, (btnId) => {
                    if (btnId === 'buy') {
                        used[activeCategory] = Math.max(0, used[activeCategory] - 5);
                        saveUsed(); updateCounters();
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                        hintText.textContent = `✨ +5 вопросов для категории ${getCategoryName()}`;
                        setTimeout(() => hintText.textContent = 'НАЖМИ НА ШАР — УЗНАЙ БУДУЩЕЕ', 3000);
                    }
                });
            } else { alert('⭐ Покупка через Telegram Stars'); }
        }
        
        function sharePrediction() {
            if (!currentAnswer) { hintText.textContent = 'Сначала получи предсказание'; return; }
            const text = `🔮 ${currentAnswer} 🔮`;
            const link = getReferralLink();
            if (tg?.openTelegramLink) { tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`); } 
            else { alert(text + '\n' + link); }
        }
        
        function inviteFriend() {
            const link = getReferralLink();
            const text = `🧙‍♀️ Загляни в магический шар — первое предсказание бесплатно`;
            if (tg?.openTelegramLink) { tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`); } 
            else { alert('👥 Пригласить друга: ' + link); }
        }
        
        // ========== 3D СЦЕНА — КИНЕМАТОГРАФИЧНЫЙ ОРАКУЛ ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118);
        scene.fog = new THREE.FogExp2(0x010118, 0.003);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 4.2);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.1;
        document.body.appendChild(renderer.domElement);
        
        // Пост-эффекты: Bloom для строгого свечения
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.9, 0.3, 0.6);
        bloomPass.threshold = 0.05;   // Порог яркости для свечения
        bloomPass.strength = 0.85;    // Интенсивность
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // === ОСНОВНОЙ ШАР — ХОЛОДНОЕ СТЕКЛО С ПРЕЛОМЛЕНИЕМ ===
        const geometry = new THREE.SphereGeometry(1.0, 256, 256);
        const material = new THREE.MeshPhysicalMaterial({
            color: 0x88aaff,
            emissive: 0x001133,
            emissiveIntensity: 0.15,
            metalness: 0.98,
            roughness: 0.28,
            clearcoat: 1.0,
            clearcoatRoughness: 0.12,
            reflectivity: 0.55,
            transparent: true,
            opacity: 0.92,
            side: THREE.DoubleSide
        });
        const sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);
        
        // === ДОПОЛНИТЕЛЬНОЕ ВНУТРЕННЕЕ СВЕЧЕНИЕ ===
        const glowMaterial = new THREE.MeshBasicMaterial({
            color: 0x3377ff,
            transparent: true,
            opacity: 0.12,
            side: THREE.BackSide
        });
        const innerGlow = new THREE.Mesh(new THREE.SphereGeometry(0.98, 64, 64), glowMaterial);
        scene.add(innerGlow);
        
        // === КОРОНА — МИНИМАЛИСТИЧНЫЕ КОЛЬЦА ===
        const rings = [];
        const ringColors = [0x4488ff, 0x2266cc, 0x4488ff];
        for (let i = 0; i < 3; i++) {
            const ringGeo = new THREE.TorusGeometry(1.08 + i * 0.045, 0.008, 128, 300);
            const ringMat = new THREE.MeshStandardMaterial({
                color: ringColors[i],
                emissive: 0x2266aa,
                emissiveIntensity: 0.35 - i * 0.08,
                transparent: true,
                opacity: 0.45 - i * 0.08,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            scene.add(ring);
            rings.push(ring);
        }
        
        // === ЛУЧЕЙ НЕТ — ТОЛЬКО ЛЁГКИЕ ЧАСТИЦЫ ДЛЯ ГЛУБИНЫ ===
        const dustCount = 1200;
        const dustGeo = new THREE.BufferGeometry();
        const dustPositions = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            const r = 1.18 + Math.random() * 0.45;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            dustPositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
            dustPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            dustPositions[i*3+2] = r * Math.cos(phi);
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        const dustMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.005, transparent: true, blending: THREE.AdditiveBlending });
        const dust = new THREE.Points(dustGeo, dustMat);
        scene.add(dust);
        
        // === АНИМАЦИЯ ===
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012;
            
            // Плавная пульсация колец
            rings.forEach((ring, idx) => {
                const pulse = 1 + Math.sin(time * 2.2 + idx) * 0.025;
                ring.scale.set(pulse, pulse, pulse);
                if (ring.material) ring.material.emissiveIntensity = 0.38 + Math.sin(time * 2 + idx) * 0.12;
            });
            
            // Медленное вращение частиц и шара
            dust.rotation.y = time * 0.06;
            dust.rotation.x = Math.sin(time * 0.2) * 0.08;
            sphere.rotation.y = time * 0.04;
            innerGlow.rotation.y = time * 0.03;
            
            effectComposer.render();
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // === ВСПЫШКА ПРИ НАЖАТИИ (МИНИМАЛИСТИЧНАЯ) ===
        function flashEffect() {
            material.emissiveIntensity = 0.65;
            rings.forEach(ring => { if (ring.material) ring.material.emissiveIntensity = 0.9; });
            setTimeout(() => {
                material.emissiveIntensity = 0.15;
                rings.forEach(ring => { if (ring.material) ring.material.emissiveIntensity = 0.38; });
            }, 250);
        }
        
        // === ПОЛУЧЕНИЕ ПРЕДСКАЗАНИЯ ===
        async function castSpell() {
            if (isCasting) return;
            if (used[activeCategory] >= 1) {
                hintText.textContent = '⚠️ Лимит на сегодня. Купи дополнительные вопросы.';
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                return;
            }
            isCasting = true;
            used[activeCategory]++;
            saveUsed();
            updateCounters();
            flashEffect();
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            hintText.textContent = '⚡ Активация оракула...';
            answerText.innerHTML = '✨';
            
            await new Promise(r => setTimeout(r, 1000));
            
            currentAnswer = getRandomPrediction();
            answerText.innerHTML = currentAnswer;
            hintText.textContent = '✨ Предсказание готово ✨';
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            isCasting = false;
        }
        
        // === СОБЫТИЯ ===
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeCategory = btn.dataset.cat;
                hintText.textContent = `🎯 Сфера: ${btn.innerHTML}`;
                answerText.innerHTML = 'ВЕДЬМА СКАЗАЛА';
            });
        });
        
        window.addEventListener('click', (e) => {
            if (e.target.classList && (e.target.classList.contains('category-btn') || e.target.classList.contains('action-btn'))) return;
            castSpell();
        });
        
        buyBtn.addEventListener('click', buyQuestions);
        shareBtn.addEventListener('click', sharePrediction);
        inviteBtn.addEventListener('click', inviteFriend);
        
        loadData();
        if (tg) tg.expand();
        console.log('✅ Кинематографичный оракул запущен');
    </script>
</body>
</html>
