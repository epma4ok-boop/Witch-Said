<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ведьма сказала | Солнечное затмение — Уровень 2</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            background: #000;
        }
        
        /* UI — Минималистичный, почти невидимый */
        .ui {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 20;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
            padding: 30px 20px 35px;
            pointer-events: none;
            text-align: center;
        }
        .answer-text {
            font-size: 20px;
            font-weight: 400;
            color: #EEEEFF;
            text-shadow: 0 0 15px rgba(50,100,200,0.5);
            letter-spacing: 1px;
            max-width: 85%;
            margin: 0 auto;
            font-family: monospace;
        }
        .hint-text {
            font-size: 11px;
            color: #88AADD;
            letter-spacing: 2px;
            margin-top: 10px;
            text-transform: uppercase;
        }
        
        .category-panel {
            position: absolute;
            top: 55px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 20;
            pointer-events: auto;
            padding: 0 20px;
        }
        .category-btn {
            background: rgba(10,10,20,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(68,102,204,0.5);
            color: #CCDDEE;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: monospace;
        }
        .category-btn.active {
            background: rgba(68,102,204,0.7);
            border-color: #88AAFF;
            color: white;
            box-shadow: 0 0 15px rgba(68,102,204,0.5);
        }
        
        .counter-panel {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 15px auto 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 5px 24px;
            width: fit-content;
            border: 1px solid rgba(68,136,255,0.3);
            pointer-events: none;
        }
        .counter-item {
            display: flex;
            gap: 6px;
            font-size: 12px;
            color: #99AACC;
        }
        .counter-value {
            font-weight: 700;
            font-size: 18px;
            color: #88AAFF;
        }
        
        .action-buttons {
            position: absolute;
            bottom: 25px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 20;
            pointer-events: auto;
            padding: 0 20px;
        }
        .action-btn {
            background: rgba(10,10,20,0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(68,136,255,0.6);
            color: #EEF;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            max-width: 130px;
            text-align: center;
            font-family: monospace;
        }
        .action-btn:active { transform: scale(0.96); background: rgba(68,102,204,0.8); }
        
        @media (max-width: 600px) {
            .answer-text { font-size: 16px; }
            .category-btn { padding: 6px 14px; font-size: 11px; }
            .action-btn { padding: 7px 12px; font-size: 11px; max-width: 110px; }
        }
    </style>
</head>
<body>

    <div class="category-panel">
        <button class="category-btn active" data-cat="love">💙 ЛЮБОВЬ</button>
        <button class="category-btn" data-cat="work">⚙️ РАБОТА</button>
        <button class="category-btn" data-cat="money">📊 ДЕНЬГИ</button>
    </div>
    
    <div class="ui">
        <div class="answer-text" id="answerText">ВЕДЬМА СКАЗАЛА</div>
        <div class="hint-text" id="hintText">КОСНИСЬ ШАРА — ОТКРОЙ ИСТИНУ</div>
        <div class="counter-panel">
            <div class="counter-item"><span>💙</span><span class="counter-value" id="counterLove">1</span></div>
            <div class="counter-item"><span>⚙️</span><span class="counter-value" id="counterWork">1</span></div>
            <div class="counter-item"><span>📊</span><span class="counter-value" id="counterMoney">1</span></div>
        </div>
    </div>
    
    <div class="action-buttons">
        <button class="action-btn" id="buyBtn">⭐ КУПИТЬ</button>
        <button class="action-btn" id="shareBtn">📤 ПОДЕЛИТЬСЯ</button>
        <button class="action-btn" id="inviteBtn">👥 ПРИГЛАСИТЬ</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- Telegram ---
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        
        // --- Логика приложения ---
        const predictions = {
            love: { ru: ["Он напишет, когда захочет. Не жди.", "Сердце знает, но разум сомневается.", "Любовь рядом. Или нет."], en: ["He'll text when he wants.", "Heart knows, mind doubts.", "Love is near. Or not."] },
            work: { ru: ["Начальник заметит. Когда ты будешь в отпуске.", "Идею украдут через неделю.", "Успех близко. Сперва допей отчёт."], en: ["Boss will notice on your vacation.", "Idea will be stolen next week.", "Success is near. Finish report first."] },
            money: { ru: ["Деньги придут. Как налоги, только приятнее.", "Инвестируй в себя. Например, в этот шар.", "Удача рядом. Но не прокути."], en: ["Money will come. Like taxes, but nicer.", "Invest in yourself. Like this orb.", "Luck is near. Don't splurge."] }
        };
        
        let currentLang = 'ru';
        let activeCategory = 'love';
        let used = { love: 0, work: 0, money: 0 };
        let isCasting = false;
        let currentAnswer = '';
        let myReferralCode = 'witch_' + Math.random().toString(36).substr(2, 8);
        
        const answerText = document.getElementById('answerText');
        const hintText = document.getElementById('hintText');
        const counterLove = document.getElementById('counterLove');
        const counterWork = document.getElementById('counterWork');
        const counterMoney = document.getElementById('counterMoney');
        
        function updateCounters() {
            counterLove.textContent = 1 - used.love;
            counterWork.textContent = 1 - used.work;
            counterMoney.textContent = 1 - used.money;
        }
        function loadData() {
            const saved = localStorage.getItem('witch_used');
            if (saved) try { used = JSON.parse(saved); } catch(e) {}
            const lastDate = localStorage.getItem('witch_date');
            const today = new Date().toDateString();
            if (lastDate !== today) {
                used = { love: 0, work: 0, money: 0 };
                localStorage.setItem('witch_date', today);
                saveUsed();
            }
            updateCounters();
        }
        function saveUsed() { localStorage.setItem('witch_used', JSON.stringify(used)); }
        function getRandomPrediction() { return predictions[activeCategory][currentLang][Math.floor(Math.random() * predictions[activeCategory][currentLang].length)]; }
        function getReferralLink() { const bot = tg?.initDataUnsafe?.user?.username || 'witch_said_bot'; return `https://t.me/${bot}?startapp=${myReferralCode}`; }
        
        function buyQuestions() {
            if (tg) {
                tg.showPopup({
                    title: '⭐ Купить вопросы',
                    message: '+5 вопросов за 10 Telegram Stars?',
                    buttons: [{ id: 'buy', type: 'default', text: 'Купить' }, { id: 'cancel', type: 'cancel', text: 'Отмена' }]
                }, (btnId) => {
                    if (btnId === 'buy') {
                        used[activeCategory] = Math.max(0, used[activeCategory] - 5);
                        saveUsed(); updateCounters();
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                        hintText.textContent = `✨ +5 вопросов`;
                        setTimeout(() => hintText.textContent = 'КОСНИСЬ ШАРА — ОТКРОЙ ИСТИНУ', 3000);
                    }
                });
            } else { alert('⭐ Покупка через Telegram Stars'); }
        }
        function sharePrediction() {
            if (!currentAnswer) { hintText.textContent = 'Сначала получи предсказание'; return; }
            const text = `🔮 ${currentAnswer} 🔮`;
            const link = getReferralLink();
            if (tg?.openTelegramLink) { tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`); } 
            else { alert(text + '\n' + link); }
        }
        function inviteFriend() {
            const link = getReferralLink();
            const text = `🧙‍♀️ Загляни в магический шар — первое предсказание бесплатно`;
            if (tg?.openTelegramLink) { tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`); } 
            else { alert('👥 Пригласить: ' + link); }
        }
        
        // ========== 3D СЦЕНА — УРОВЕНЬ 2 ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118);
        scene.fog = new THREE.FogExp2(0x010118, 0.0015);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 4.2);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.3;
        document.body.appendChild(renderer.domElement);
        
        // Bloom
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.9, 0.3, 0.7);
        bloomPass.threshold = 0.08;
        bloomPass.strength = 1.0;
        bloomPass.radius = 0.65;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // ========== СТАРОМУДРЫЙ SHADER ЗАТМЕНИЯ ==========
        const vertexShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = 1.0;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        
        const fragmentShader = `
            uniform float uTime;
            uniform vec3 uColorDay;
            uniform vec3 uColorNight;
            uniform float uEclipseProgress;
            varying vec2 vUv;
            varying vec3 vNormal;
            
            void main() {
                vec3 lightDir = normalize(vec3(1.0, 1.8, 1.2));
                float dotNL = max(0.15, dot(vNormal, lightDir));
                
                float eclipseFactor = smoothstep(0.2, 0.8, vUv.x);
                eclipseFactor = mix(eclipseFactor, 1.0 - eclipseFactor, uEclipseProgress);
                
                float corona = pow(1.0 - abs(vUv.x - 0.5) * 2.0, 2.5) * 0.9;
                corona += sin(vUv.y * 80.0 + uTime * 12.0) * 0.08;
                corona += sin(vUv.x * 120.0 - uTime * 15.0) * 0.06;
                
                float sparkle = sin(vUv.x * 150.0 + uTime * 40.0) * 0.12;
                sparkle += cos(vUv.y * 180.0 + uTime * 35.0) * 0.1;
                
                vec3 finalColor = mix(uColorNight, uColorDay, dotNL * (1.0 - eclipseFactor));
                finalColor += vec3(0.9, 0.65, 0.35) * corona * (0.6 + uEclipseProgress * 1.2);
                finalColor += vec3(1.0, 0.85, 0.5) * max(0.0, sparkle) * uEclipseProgress * 0.8;
                
                finalColor = pow(finalColor, vec3(1.0/1.1));
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;
        
        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uColorDay: { value: new THREE.Color(0x6688cc) },
                uColorNight: { value: new THREE.Color(0x110022) },
                uEclipseProgress: { value: 0.5 }
            },
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: false,
            side: THREE.DoubleSide
        });
        
        const sphereGeometry = new THREE.SphereGeometry(1.0, 512, 512);
        const eclipseSphere = new THREE.Mesh(sphereGeometry, shaderMaterial);
        scene.add(eclipseSphere);
        
        // ========== HDRI-ЗВЁЗДЫ (20 000 ЧАСТИЦ ВОКРУГ) ==========
        const starCount = 20000;
        const starGeo = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            // Разбрасываем звёзды в большом кубе
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMat = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.08,
            transparent: true,
            opacity: 0.7,
            blending: THREE.AdditiveBlending
        });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // ========== КОРОНА — 50 000 МЕРЦАЮЩИХ ЧАСТИЦ ==========
        const particleCount = 50000;
        const coronaGeo = new THREE.BufferGeometry();
        const coronaPositions = new Float32Array(particleCount * 3);
        const coronaColors = new Float32Array(particleCount * 3);
        
        for (let i = 0; i < particleCount; i++) {
            // Распределение частиц по сфере с разбросом
            const r = 1.08 + Math.pow(Math.random(), 1.5) * 0.35;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            coronaPositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
            coronaPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            coronaPositions[i*3+2] = r * Math.cos(phi);
            
            // Цвет частицы: от золотого до красноватого
            const colorChoice = Math.random();
            if (colorChoice < 0.7) {
                coronaColors[i*3] = 1.0;
                coronaColors[i*3+1] = 0.6 + Math.random() * 0.3;
                coronaColors[i*3+2] = 0.2 + Math.random() * 0.3;
            } else if (colorChoice < 0.9) {
                coronaColors[i*3] = 1.0;
                coronaColors[i*3+1] = 0.3 + Math.random() * 0.4;
                coronaColors[i*3+2] = 0.5 + Math.random() * 0.5;
            } else {
                coronaColors[i*3] = 0.8 + Math.random() * 0.2;
                coronaColors[i*3+1] = 0.2 + Math.random() * 0.3;
                coronaColors[i*3+2] = 0.9 + Math.random() * 0.1;
            }
        }
        coronaGeo.setAttribute('position', new THREE.BufferAttribute(coronaPositions, 3));
        coronaGeo.setAttribute('color', new THREE.BufferAttribute(coronaColors, 3));
        
        const coronaMatLevel2 = new THREE.PointsMaterial({
            size: 0.005,
            vertexColors: true,
            transparent: true,
            blending: THREE.AdditiveBlending,
            opacity: 0.65
        });
        const coronaParticles = new THREE.Points(coronaGeo, coronaMatLevel2);
        scene.add(coronaParticles);
        
        // Внутренние светящиеся частицы (магическая пыль)
        const dustCount = 8000;
        const dustGeo = new THREE.BufferGeometry();
        const dustPositions = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            const r = 0.92 + Math.random() * 0.25;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            dustPositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
            dustPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            dustPositions[i*3+2] = r * Math.cos(phi);
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        const dustMat = new THREE.PointsMaterial({
            color: 0x88aaff,
            size: 0.003,
            transparent: true,
            blending: THREE.AdditiveBlending,
            opacity: 0.45
        });
        const dustParticles = new THREE.Points(dustGeo, dustMat);
        scene.add(dustParticles);
        
        // Анимация
        let time = 0;
        let eclipsePhase = 0;
        let eclipseDirection = 1;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            eclipsePhase += 0.0018 * eclipseDirection;
            if (eclipsePhase >= 1) { eclipsePhase = 1; eclipseDirection = -1; }
            if (eclipsePhase <= 0) { eclipsePhase = 0; eclipseDirection = 1; }
            
            shaderMaterial.uniforms.uTime.value = time;
            shaderMaterial.uniforms.uEclipseProgress.value = eclipsePhase;
            
            // Вращение звёзд
            stars.rotation.y = time * 0.01;
            stars.rotation.x = time * 0.005;
            
            // Анимация короны
            coronaParticles.rotation.y = time * 0.03;
            coronaParticles.rotation.x = Math.sin(time * 0.15) * 0.05;
            dustParticles.rotation.y = time * 0.02;
            dustParticles.rotation.x = Math.sin(time * 0.2) * 0.08;
            
            effectComposer.render();
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Вспышка
        function flashEffect() {
            shaderMaterial.uniforms.uEclipseProgress.value = 0.98;
            coronaMatLevel2.opacity = 1.0;
            setTimeout(() => {
                shaderMaterial.uniforms.uEclipseProgress.value = eclipsePhase;
                coronaMatLevel2.opacity = 0.65;
            }, 350);
        }
        
        async function castSpell() {
            if (isCasting) return;
            if (used[activeCategory] >= 1) {
                hintText.textContent = '⚠️ Лимит на сегодня. Купи дополнительные вопросы.';
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                return;
            }
            isCasting = true;
            used[activeCategory]++;
            saveUsed();
            updateCounters();
            flashEffect();
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            hintText.textContent = '⚡ Затмение активировано...';
            answerText.innerHTML = '✨';
            
            await new Promise(r => setTimeout(r, 1100));
            
            currentAnswer = getRandomPrediction();
            answerText.innerHTML = currentAnswer;
            hintText.textContent = '✨ Предсказание готово ✨';
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            isCasting = false;
        }
        
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeCategory = btn.dataset.cat;
                hintText.textContent = `🎯 СФЕРА: ${btn.innerHTML}`;
                answerText.innerHTML = 'ВЕДЬМА СКАЗАЛА';
            });
        });
        
        window.addEventListener('click', (e) => {
            if (e.target.classList && (e.target.classList.contains('category-btn') || e.target.classList.contains('action-btn'))) return;
            castSpell();
        });
        
        document.getElementById('buyBtn').addEventListener('click', buyQuestions);
        document.getElementById('shareBtn').addEventListener('click', sharePrediction);
        document.getElementById('inviteBtn').addEventListener('click', inviteFriend);
        
        loadData();
        if (tg) tg.expand();
        console.log('🌞 Уровень 2 активен: 50k частиц + HDRI-звёзды');
    </script>
</body>
</html>
