<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ведьма сказала | Солнечное затмение</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', monospace;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        .ui {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            padding: 60px 20px 40px;
            box-sizing: border-box;
        }
        .answer-area {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 20px;
            pointer-events: none;
        }
        .answer-text {
            font-size: 22px;
            font-weight: 500;
            color: #FFF2E0;
            text-shadow: 0 0 10px rgba(255,80,0,0.5);
            letter-spacing: 1px;
            word-break: break-word;
        }
        .hint-text {
            font-size: 11px;
            color: #FFCC88;
            letter-spacing: 2px;
            margin-top: 8px;
            text-transform: uppercase;
        }
        .category-panel {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            pointer-events: auto;
        }
        .category-btn {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,100,50,0.6);
            color: #FFEEDD;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
        }
        .category-btn.active {
            background: rgba(255,80,50,0.8);
            border-color: #FFAA88;
            color: white;
            box-shadow: 0 0 15px rgba(255,80,50,0.6);
        }
        .counter-panel {
            display: flex;
            justify-content: center;
            gap: 30px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 8px 24px;
            width: fit-content;
            margin: 0 auto 20px;
            border: 1px solid rgba(255,100,50,0.3);
            pointer-events: none;
        }
        .counter-item {
            display: flex;
            gap: 6px;
            font-size: 13px;
            color: #FFCCAA;
        }
        .counter-value {
            font-weight: 800;
            font-size: 20px;
            color: #FFAA66;
            text-shadow: 0 0 3px #FF4400;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: auto;
            pointer-events: auto;
        }
        .action-btn {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,100,50,0.7);
            color: #FFEEDD;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            flex: 1;
            max-width: 130px;
            text-align: center;
            transition: 0.2s;
        }
        .action-btn:active {
            transform: scale(0.96);
            background: rgba(255,80,50,0.9);
        }
        @media (max-width: 600px) {
            .answer-text { font-size: 18px; }
            .category-btn { padding: 6px 16px; font-size: 12px; }
            .action-btn { padding: 8px 12px; font-size: 12px; max-width: 110px; }
        }
    </style>
</head>
<body>
<div class="container">
    <canvas id="eclipseCanvas"></canvas>
    <div class="ui">
        <div>
            <div class="category-panel">
                <button class="category-btn active" data-cat="love">💗 ЛЮБОВЬ</button>
                <button class="category-btn" data-cat="work">⚙️ РАБОТА</button>
                <button class="category-btn" data-cat="money">📊 ДЕНЬГИ</button>
            </div>
            <div class="answer-area">
                <div class="answer-text" id="answerText">ВЕДЬМА СКАЗАЛА</div>
                <div class="hint-text" id="hintText">КОСНИСЬ ШАРА — ОТКРОЙ ИСТИНУ</div>
            </div>
            <div class="counter-panel">
                <div class="counter-item"><span>💗</span><span class="counter-value" id="counterLove">1</span></div>
                <div class="counter-item"><span>⚙️</span><span class="counter-value" id="counterWork">1</span></div>
                <div class="counter-item"><span>📊</span><span class="counter-value" id="counterMoney">1</span></div>
            </div>
        </div>
        <div class="action-buttons">
            <button class="action-btn" id="buyBtn">⭐ КУПИТЬ</button>
            <button class="action-btn" id="shareBtn">📤 ПОДЕЛИТЬСЯ</button>
            <button class="action-btn" id="inviteBtn">👥 ПРИГЛАСИТЬ</button>
        </div>
    </div>
</div>

<script>
    // ========== TELEGRAM ЛОГИКА ==========
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }
    
    const predictions = {
        love: { ru: ["Он напишет, когда захочет. Не жди.", "Сердце знает, но разум сомневается.", "Любовь рядом. Или нет."], en: ["He'll text when he wants.", "Heart knows, mind doubts.", "Love is near. Or not."] },
        work: { ru: ["Начальник заметит. Когда ты будешь в отпуске.", "Идею украдут через неделю.", "Успех близко. Сперва допей отчёт."], en: ["Boss will notice on your vacation.", "Idea will be stolen next week.", "Success is near. Finish report first."] },
        money: { ru: ["Деньги придут. Как налоги, только приятнее.", "Инвестируй в себя. Например, в этот шар.", "Удача рядом. Но не прокути."], en: ["Money will come. Like taxes, but nicer.", "Invest in yourself. Like this orb.", "Luck is near. Don't splurge."] }
    };
    
    let currentLang = 'ru';
    let activeCategory = 'love';
    let used = { love: 0, work: 0, money: 0 };
    let isCasting = false;
    let currentAnswer = '';
    let myReferralCode = 'witch_' + Math.random().toString(36).substr(2, 8);
    
    const answerText = document.getElementById('answerText');
    const hintText = document.getElementById('hintText');
    const counterLove = document.getElementById('counterLove');
    const counterWork = document.getElementById('counterWork');
    const counterMoney = document.getElementById('counterMoney');
    const buyBtn = document.getElementById('buyBtn');
    const shareBtn = document.getElementById('shareBtn');
    const inviteBtn = document.getElementById('inviteBtn');
    const categoryBtns = document.querySelectorAll('.category-btn');
    
    function updateCounters() {
        counterLove.textContent = 1 - used.love;
        counterWork.textContent = 1 - used.work;
        counterMoney.textContent = 1 - used.money;
    }
    function loadData() {
        const saved = localStorage.getItem('witch_used');
        if (saved) try { used = JSON.parse(saved); } catch(e) {}
        const lastDate = localStorage.getItem('witch_date');
        const today = new Date().toDateString();
        if (lastDate !== today) {
            used = { love: 0, work: 0, money: 0 };
            localStorage.setItem('witch_date', today);
            saveUsed();
        }
        updateCounters();
    }
    function saveUsed() { localStorage.setItem('witch_used', JSON.stringify(used)); }
    function getRandomPrediction() { return predictions[activeCategory][currentLang][Math.floor(Math.random() * predictions[activeCategory][currentLang].length)]; }
    function getReferralLink() { const bot = tg?.initDataUnsafe?.user?.username || 'witch_said_bot'; return `https://t.me/${bot}?startapp=${myReferralCode}`; }
    function buyQuestions() {
        if (tg) {
            tg.showPopup({ title: '⭐ Купить вопросы', message: '+5 вопросов за 10 Telegram Stars?', buttons: [{ id: 'buy', type: 'default', text: 'Купить' }, { id: 'cancel', type: 'cancel', text: 'Отмена' }] }, (btnId) => {
                if (btnId === 'buy') {
                    used[activeCategory] = Math.max(0, used[activeCategory] - 5);
                    saveUsed(); updateCounters();
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    hintText.textContent = `✨ +5 вопросов ✨`;
                    setTimeout(() => hintText.textContent = 'КОСНИСЬ ШАРА — ОТКРОЙ ИСТИНУ', 3000);
                }
            });
        } else { alert('⭐ Покупка через Telegram Stars'); }
    }
    function sharePrediction() {
        if (!currentAnswer) { hintText.textContent = 'Сначала получи предсказание'; return; }
        const text = `🔮 ${currentAnswer} 🔮`;
        const link = getReferralLink();
        if (tg?.openTelegramLink) { tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`); } 
        else { alert(text + '\n' + link); }
    }
    function inviteFriend() {
        const link = getReferralLink();
        const text = `🧙‍♀️ Загляни в магический шар — первое предсказание бесплатно`;
        if (tg?.openTelegramLink) { tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`); } 
        else { alert('👥 Пригласить: ' + link); }
    }
    
    // ========== 2D CANVAS — МЯГКИЕ ЯЗЫКИ ПЛАМЕНИ ==========
    const canvas = document.getElementById('eclipseCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, centerX, centerY, radiusCircle;
    
    // Параметры "языков" пламени
    let flames = [];
    const FLAME_COUNT = 80;      // количество отдельных языков
    let time = 0;
    
    class FlameTongue {
        constructor(angle, baseLength, curvature, speed, colorHue) {
            this.angle = angle;           // направление от центра (радианы)
            this.baseLength = baseLength; // относительная длина (0.2..0.6) * радиус
            this.curvature = curvature;   // изгиб (0..0.4)
            this.speed = speed;           // скорость пульсации
            this.phase = Math.random() * Math.PI * 2;
            this.colorHue = colorHue;     // оттенок (0..1)
        }
        
        // Возвращает текущую длину (анимированную)
        getLength(t) {
            const pulse = 0.6 + 0.4 * Math.sin(t * this.speed + this.phase);
            return this.baseLength * pulse;
        }
        
        // Возвращает текущую кривизну
        getCurvature(t) {
            const pulse = 0.5 + 0.5 * Math.sin(t * this.speed * 1.3 + this.phase);
            return this.curvature * pulse;
        }
    }
    
    function initFlames() {
        flames = [];
        for (let i = 0; i < FLAME_COUNT; i++) {
            const angle = Math.random() * Math.PI * 2;
            // длина языка: от 0.2 до 0.6 радиуса
            const baseLength = 0.25 + Math.random() * 0.4;
            // кривизна: 0.1..0.35
            const curvature = 0.15 + Math.random() * 0.25;
            const speed = 0.8 + Math.random() * 1.5;
            // оттенок: от красного (0.0) до оранжевого (0.1) и золотого (0.12)
            const colorHue = 0.05 + Math.random() * 0.1;
            flames.push(new FlameTongue(angle, baseLength, curvature, speed, colorHue));
        }
    }
    
    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        centerX = width / 2;
        centerY = height / 2;
        radiusCircle = Math.min(width, height) * 0.18;
    }
    
    // Рисование одного языка пламени как изогнутой заливки
    function drawFlame(flame, t) {
        const len = flame.getLength(t) * radiusCircle;
        const curv = flame.getCurvature(t) * radiusCircle * 0.8;
        const startRad = radiusCircle - 2; // начинаем с края чёрного круга
        const endRad = startRad + len;
        
        const angle = flame.angle;
        const startX = centerX + Math.cos(angle) * startRad;
        const startY = centerY + Math.sin(angle) * startRad;
        
        // Направление перпендикулярно лучу для изгиба
        const perpX = -Math.sin(angle);
        const perpY = Math.cos(angle);
        
        // Контрольная точка для кривой
        const midX = startX + Math.cos(angle) * (len * 0.6) + perpX * curv;
        const midY = startY + Math.sin(angle) * (len * 0.6) + perpY * curv;
        
        const endX = startX + Math.cos(angle) * len;
        const endY = startY + Math.sin(angle) * len;
        
        // Для создания объёма рисуем две кривые (левую и правую границу) и заполняем градиентом
        // Левая граница (с отрицательным изгибом)
        const leftCtrlX = startX + Math.cos(angle) * (len * 0.6) - perpX * curv * 0.8;
        const leftCtrlY = startY + Math.sin(angle) * (len * 0.6) - perpY * curv * 0.8;
        const leftEndX = endX - perpX * len * 0.15;
        const leftEndY = endY - perpY * len * 0.15;
        
        // Правая граница (с положительным изгибом)
        const rightCtrlX = startX + Math.cos(angle) * (len * 0.6) + perpX * curv * 0.8;
        const rightCtrlY = startY + Math.sin(angle) * (len * 0.6) + perpY * curv * 0.8;
        const rightEndX = endX + perpX * len * 0.15;
        const rightEndY = endY + perpY * len * 0.15;
        
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.quadraticCurveTo(leftCtrlX, leftCtrlY, leftEndX, leftEndY);
        ctx.lineTo(rightEndX, rightEndY);
        ctx.quadraticCurveTo(rightCtrlX, rightCtrlY, startX, startY);
        ctx.closePath();
        
        // Интенсивность яркости (пульсация)
        const intensity = 0.4 + 0.6 * Math.sin(t * flame.speed * 1.5 + flame.phase);
        // Цвет: от тёмно-красного до ярко-оранжевого
        const hue = flame.colorHue;
        const sat = 0.9;
        const light = 0.4 + intensity * 0.5;
        const color1 = `hsl(${hue * 360}, ${sat * 100}%, ${light * 60}%)`;
        const color2 = `hsl(${hue * 360}, ${sat * 100}%, ${(light + 0.2) * 60}%)`;
        
        const grad = ctx.createLinearGradient(startX, startY, endX, endY);
        grad.addColorStop(0, `rgba(255, 70, 20, ${0.7 * intensity})`);
        grad.addColorStop(0.5, `rgba(255, 150, 50, ${0.5 * intensity})`);
        grad.addColorStop(1, `rgba(255, 100, 20, 0)`);
        
        ctx.fillStyle = grad;
        ctx.fill();
        
        // Дополнительная центральная линия для яркости
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.quadraticCurveTo(midX, midY, endX, endY);
        ctx.lineWidth = 3 * intensity;
        ctx.strokeStyle = `rgba(255, 220, 100, ${0.6 * intensity})`;
        ctx.stroke();
    }
    
    function drawBlackCircle() {
        ctx.beginPath();
        ctx.arc(centerX, centerY, radiusCircle, 0, Math.PI * 2);
        ctx.fillStyle = '#000000';
        ctx.fill();
        // Лёгкая тень по краю для отделения
        ctx.shadowBlur = 0;
    }
    
    function drawBackground() {
        const grad = ctx.createLinearGradient(0, 0, width, height);
        grad.addColorStop(0, '#0a0500');
        grad.addColorStop(1, '#020100');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);
        
        // Добавим несколько размытых оранжевых ореолов
        for (let i = 0; i < 4; i++) {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            ctx.beginPath();
            const xOff = centerX + (Math.sin(time * 0.2 + i) * 25);
            const yOff = centerY + (Math.cos(time * 0.17 + i) * 20);
            const rad = radiusCircle * (1.3 + Math.sin(time * 0.5 + i) * 0.15);
            const grd = ctx.createRadialGradient(xOff, yOff, rad * 0.2, xOff, yOff, rad);
            grd.addColorStop(0, `rgba(255, 80, 30, 0.15)`);
            grd.addColorStop(1, `rgba(80, 30, 0, 0)`);
            ctx.fillStyle = grd;
            ctx.arc(xOff, yOff, rad, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }
    
    // Маленькие частицы (искры) для дополнительной динамики
    let particles = [];
    const PARTICLE_COUNT = 200;
    class Particle {
        constructor() {
            this.reset();
        }
        reset() {
            const angle = Math.random() * Math.PI * 2;
            const dist = 1.02 + Math.random() * 0.4;
            this.x = centerX + Math.cos(angle) * (radiusCircle * dist);
            this.y = centerY + Math.sin(angle) * (radiusCircle * dist);
            this.vx = (Math.random() - 0.5) * 1.2;
            this.vy = (Math.random() - 0.5) * 1.2;
            this.life = 0.5 + Math.random() * 0.5;
            this.size = 1 + Math.random() * 3;
            this.color = `rgba(255, ${100 + Math.random() * 100}, ${30 + Math.random() * 50}, 0.8)`;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= 0.01;
            if (this.life <= 0 || Math.hypot(this.x - centerX, this.y - centerY) > radiusCircle * 2.2) {
                this.reset();
            }
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
        }
    }
    
    function initParticles() {
        particles = [];
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new Particle());
        }
    }
    
    function updateParticles() {
        for (let p of particles) {
            p.update();
            p.draw();
        }
    }
    
    function animate() {
        time += 0.016;
        drawBackground();
        // Рисуем языки пламени
        for (let flame of flames) {
            drawFlame(flame, time);
        }
        // Рисуем чёрный круг поверх (чтобы скрыть основания языков)
        drawBlackCircle();
        // Искры
        updateParticles();
        requestAnimationFrame(animate);
    }
    
    function resizeAndReset() {
        resizeCanvas();
        // Пересоздаём частицы с новыми координатами
        initParticles();
        // Можно переинициализировать языки пламени (но они зависят от радиуса, нужно обновить их базовую длину масштабом)
        // Однако объекты FlameTongue используют относительную длину, умноженную на radiusCircle в drawFlame, поэтому всё корректно.
    }
    
    window.addEventListener('resize', () => {
        resizeAndReset();
    });
    
    // Вспышка при нажатии — усиливаем яркость на время (увеличим интенсивность через изменение параметров, но проще сделать визуальный эффект)
    function flashEffect() {
        // Временно повысим яркость фонового ореола
        // Для простоты добавим временное свечение через CSS или дополнительный слой, но так как всё рисуется на canvas,
        // можно нарисовать белую полупрозрачную вспышку поверх.
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.fillStyle = 'rgba(255, 150, 50, 0.2)';
        ctx.fillRect(0, 0, width, height);
        ctx.restore();
        // Через 200 мс всё вернётся в норму (так как следующий кадр перерисуется)
    }
    
    async function castSpell() {
        if (isCasting) return;
        if (used[activeCategory] >= 1) {
            hintText.textContent = '⚠️ Лимит на сегодня. Купи дополнительные вопросы.';
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            return;
        }
        isCasting = true;
        used[activeCategory]++;
        saveUsed();
        updateCounters();
        flashEffect();
        if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        hintText.textContent = '🔥 ВСПЫШКИ АКТИВИРОВАНЫ...';
        answerText.innerHTML = '✨';
        await new Promise(r => setTimeout(r, 1100));
        currentAnswer = getRandomPrediction();
        answerText.innerHTML = currentAnswer;
        hintText.textContent = '✨ ПРЕДСКАЗАНИЕ ГОТОВО ✨';
        if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        isCasting = false;
    }
    
    // Обработчики UI
    categoryBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            categoryBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeCategory = btn.dataset.cat;
            hintText.textContent = `🎯 ${btn.innerHTML}`;
            answerText.innerHTML = 'ВЕДЬМА СКАЗАЛА';
            // Можно слегка менять цветовую гамму языков в зависимости от категории (опционально)
        });
    });
    
    window.addEventListener('click', (e) => {
        if (e.target.classList && (e.target.classList.contains('category-btn') || e.target.classList.contains('action-btn'))) return;
        castSpell();
    });
    
    buyBtn.addEventListener('click', buyQuestions);
    shareBtn.addEventListener('click', sharePrediction);
    inviteBtn.addEventListener('click', inviteFriend);
    
    // Инициализация
    resizeCanvas();
    initFlames();
    initParticles();
    animate();
    loadData();
    if (tg) tg.expand();
    console.log('Затмение с мягкими языками пламени запущено');
</script>
</body>
</html>
