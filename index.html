<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ведьма сказала | Чёрное Солнце</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Inter', monospace; background: #000; }
        /* UI поверх 3D */
        .ui { position: absolute; bottom: 0; left: 0; right: 0; z-index: 20; background: linear-gradient(to top, rgba(0,0,0,0.85), transparent); padding: 30px 20px 35px; pointer-events: none; text-align: center; }
        .answer-text { font-size: 22px; font-weight: 500; color: #FFFFFF; text-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 8px rgba(255,100,50,0.5); max-width: 85%; margin: 0 auto; font-family: monospace; letter-spacing: 1px; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); padding: 12px 20px; border-radius: 60px; display: inline-block; }
        .hint-text { font-size: 11px; color: #CCCCFF; letter-spacing: 2px; margin-top: 15px; text-transform: uppercase; opacity: 0.8; }
        .category-panel { position: absolute; top: 55px; left: 0; right: 0; display: flex; justify-content: center; gap: 15px; z-index: 20; pointer-events: auto; padding: 0 20px; }
        .category-btn { background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,100,50,0.5); color: #FFEEDD; padding: 8px 24px; border-radius: 40px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: monospace; transition: 0.2s; }
        .category-btn.active { background: rgba(255,80,50,0.7); border-color: #FFAA88; color: white; box-shadow: 0 0 20px rgba(255,80,50,0.5); }
        .counter-panel { display: flex; justify-content: center; gap: 30px; margin: 20px auto 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); border-radius: 60px; padding: 6px 28px; width: fit-content; border: 1px solid rgba(255,100,50,0.3); pointer-events: none; }
        .counter-item { display: flex; gap: 8px; font-size: 13px; color: #FFCCAA; }
        .counter-value { font-weight: 800; font-size: 20px; color: #FFAA66; text-shadow: 0 0 5px #FF4400; }
        .action-buttons { position: absolute; bottom: 25px; left: 0; right: 0; display: flex; justify-content: center; gap: 15px; z-index: 20; pointer-events: auto; padding: 0 20px; }
        .action-btn { background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,100,50,0.6); color: #FFEEDD; padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 500; cursor: pointer; flex: 1; max-width: 130px; text-align: center; font-family: monospace; transition: 0.2s; }
        .action-btn:active { transform: scale(0.96); background: rgba(255,80,50,0.8); }
        @media (max-width: 600px) { .answer-text { font-size: 18px; padding: 8px 16px; } .category-btn { padding: 6px 16px; font-size: 12px; } .action-btn { padding: 7px 12px; font-size: 12px; max-width: 110px; } .counter-value { font-size: 16px; } }
    </style>
</head>
<body>
    <div class="category-panel">
        <button class="category-btn active" data-cat="love">💗 ЛЮБОВЬ</button>
        <button class="category-btn" data-cat="work">⚙️ РАБОТА</button>
        <button class="category-btn" data-cat="money">📊 ДЕНЬГИ</button>
    </div>
    <div class="ui">
        <div class="answer-text" id="answerText">ВЕДЬМА СКАЗАЛА</div>
        <div class="hint-text" id="hintText">КОСНИСЬ ШАРА — ОТКРОЙ ИСТИНУ</div>
        <div class="counter-panel">
            <div class="counter-item"><span>💗</span><span class="counter-value" id="counterLove">1</span></div>
            <div class="counter-item"><span>⚙️</span><span class="counter-value" id="counterWork">1</span></div>
            <div class="counter-item"><span>📊</span><span class="counter-value" id="counterMoney">1</span></div>
        </div>
    </div>
    <div class="action-buttons">
        <button class="action-btn" id="buyBtn">⭐ КУПИТЬ</button>
        <button class="action-btn" id="shareBtn">📤 ПОДЕЛИТЬСЯ</button>
        <button class="action-btn" id="inviteBtn">👥 ПРИГЛАСИТЬ</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- Telegram ---
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        
        // --- Логика приложения (предсказания, счётчики) ---
        const predictions = {
            love: { ru: ["Он напишет, когда захочет. Не жди.", "Сердце знает, но разум сомневается.", "Любовь рядом. Или нет."], en: ["He'll text when he wants.", "Heart knows, mind doubts.", "Love is near. Or not."] },
            work: { ru: ["Начальник заметит. Когда ты будешь в отпуске.", "Идею украдут через неделю.", "Успех близко. Сперва допей отчёт."], en: ["Boss will notice on your vacation.", "Idea will be stolen next week.", "Success is near. Finish report first."] },
            money: { ru: ["Деньги придут. Как налоги, только приятнее.", "Инвестируй в себя. Например, в этот шар.", "Удача рядом. Но не прокути."], en: ["Money will come. Like taxes, but nicer.", "Invest in yourself. Like this orb.", "Luck is near. Don't splurge."] }
        };
        
        let currentLang = 'ru'; let activeCategory = 'love'; let used = { love: 0, work: 0, money: 0 }; let isCasting = false; let currentAnswer = ''; let myReferralCode = 'witch_' + Math.random().toString(36).substr(2, 8);
        const answerText = document.getElementById('answerText'); const hintText = document.getElementById('hintText');
        const counterLove = document.getElementById('counterLove'); const counterWork = document.getElementById('counterWork'); const counterMoney = document.getElementById('counterMoney');
        function updateCounters() { counterLove.textContent = 1 - used.love; counterWork.textContent = 1 - used.work; counterMoney.textContent = 1 - used.money; }
        function loadData() { const saved = localStorage.getItem('witch_used'); if (saved) try { used = JSON.parse(saved); } catch(e) {} const lastDate = localStorage.getItem('witch_date'); const today = new Date().toDateString(); if (lastDate !== today) { used = { love: 0, work: 0, money: 0 }; localStorage.setItem('witch_date', today); saveUsed(); } updateCounters(); }
        function saveUsed() { localStorage.setItem('witch_used', JSON.stringify(used)); }
        function getRandomPrediction() { return predictions[activeCategory][currentLang][Math.floor(Math.random() * predictions[activeCategory][currentLang].length)]; }
        function getReferralLink() { const bot = tg?.initDataUnsafe?.user?.username || 'witch_said_bot'; return `https://t.me/${bot}?startapp=${myReferralCode}`; }
        function buyQuestions() { if (tg) { tg.showPopup({ title: '⭐ Купить вопросы', message: '+5 вопросов за 10 Telegram Stars?', buttons: [{ id: 'buy', type: 'default', text: 'Купить' }, { id: 'cancel', type: 'cancel', text: 'Отмена' }] }, (btnId) => { if (btnId === 'buy') { used[activeCategory] = Math.max(0, used[activeCategory] - 5); saveUsed(); updateCounters(); if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success'); hintText.textContent = `✨ +5 вопросов ✨`; setTimeout(() => hintText.textContent = 'КОСНИСЬ ШАРА — ОТКРОЙ ИСТИНУ', 3000); } }); } else { alert('⭐ Покупка через Telegram Stars'); } }
        function sharePrediction() { if (!currentAnswer) { hintText.textContent = 'Сначала получи предсказание'; return; } const text = `🔮 ${currentAnswer} 🔮`; const link = getReferralLink(); if (tg?.openTelegramLink) { tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`); } else { alert(text + '\n' + link); } }
        function inviteFriend() { const link = getReferralLink(); const text = `🧙‍♀️ Загляни в магический шар — первое предсказание бесплатно`; if (tg?.openTelegramLink) { tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`); } else { alert('👥 Пригласить: ' + link); } }
        
        // ========== 3D СЦЕНА ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010110);
        scene.fog = new THREE.FogExp2(0x010110, 0.0012);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 4.0);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);
        
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.0, 0.3, 0.8);
        bloomPass.threshold = 0.08; bloomPass.strength = 1.2; bloomPass.radius = 0.7;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // === ЧЁРНЫЙ ЦЕНТР (АБСОЛЮТНО ЧЁРНЫЙ ШАР) ===
        const coreGeometry = new THREE.SphereGeometry(0.98, 256, 256);
        const coreMaterial = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.8, metalness: 0.05 });
        const blackCore = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(blackCore);
        
        // === КОРОНА — ТОЛЬКО СНАРУЖИ (ШЕЙДЕР) ===
        const coronaColors = {
            love: { base: [1.0, 0.2, 0.4], glow: [1.0, 0.5, 0.7] },
            work: { base: [1.0, 0.5, 0.1], glow: [1.0, 0.8, 0.4] },
            money: { base: [0.2, 0.9, 0.4], glow: [0.5, 1.0, 0.7] }
        };
        let currentCorona = coronaColors.love;
        
        const coronaVertex = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = 1.0;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        
        const coronaFragment = `
            uniform float uTime;
            uniform vec3 uBase;
            uniform vec3 uGlow;
            varying vec2 vUv;
            
            void main() {
                vec2 uv = vUv;
                float radius = length(uv - 0.5) * 2.0;
                // Создаём "рваные" языки пламени ТОЛЬКО на периферии, центр оставляем пустым
                if (radius < 0.65) discard;  // Запрещаем любые пиксели внутри радиуса 0.65 (центр)
                
                vec2 warped = uv + vec2(
                    sin(uv.y * 40.0 + uTime * 6.0) * 0.06,
                    cos(uv.x * 35.0 - uTime * 5.0) * 0.06
                );
                float flame1 = sin(warped.x * 45.0 - uTime * 9.0) * cos(warped.y * 40.0 + uTime * 7.0);
                float flame2 = sin(warped.y * 55.0 + uTime * 11.0) * cos(warped.x * 50.0 - uTime * 8.0);
                float flame3 = sin((warped.x * 2.0 - warped.y) * 30.0 + uTime * 13.0);
                float flame4 = cos((warped.y * 2.0 + warped.x) * 28.0 - uTime * 10.0);
                float intensity = (flame1 + flame2 + flame3 + flame4) / 4.0;
                intensity = pow(abs(intensity), 1.1) * 1.1;
                
                float edgeFactor = smoothstep(0.7, 1.2, radius);
                intensity *= edgeFactor * 0.9;
                intensity = clamp(intensity, 0.0, 1.0);
                
                float sparkle = sin(uv.x * 180.0 + uTime * 40.0) * sin(uv.y * 150.0 - uTime * 35.0);
                intensity += max(0.0, sparkle) * 0.5;
                
                vec3 color = mix(uBase, uGlow, intensity * 1.4);
                float alpha = intensity * 0.9;
                
                gl_FragColor = vec4(color, alpha);
            }
        `;
        
        const coronaGeometry = new THREE.SphereGeometry(1.12, 512, 512);
        const coronaMaterial = new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0 }, uBase: { value: new THREE.Color(currentCorona.base[0], currentCorona.base[1], currentCorona.base[2]) }, uGlow: { value: new THREE.Color(currentCorona.glow[0], currentCorona.glow[1], currentCorona.glow[2]) } },
            vertexShader: coronaVertex,
            fragmentShader: coronaFragment,
            transparent: true,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const corona = new THREE.Mesh(coronaGeometry, coronaMaterial);
        scene.add(corona);
        
        // === ДОПОЛНИТЕЛЬНЫЕ ЧАСТИЦЫ ДЛЯ ОБЪЁМА (15 000) ===
        let particles = null;
        function buildParticles(col) {
            if (particles) scene.remove(particles);
            const count = 15000;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            const cols = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const r = 1.12 + Math.pow(Math.random(), 1.3) * 0.45;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                pos[i*3] = r * Math.sin(phi) * Math.cos(theta);
                pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                pos[i*3+2] = r * Math.cos(phi);
                const mix = Math.random();
                cols[i*3] = col.base[0] * (0.4 + mix * 0.8);
                cols[i*3+1] = col.base[1] * (0.4 + mix * 0.8);
                cols[i*3+2] = col.base[2] * (0.4 + mix * 0.8);
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
            const mat = new THREE.PointsMaterial({ size: 0.0055, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.6 });
            particles = new THREE.Points(geo, mat);
            scene.add(particles);
        }
        buildParticles(currentCorona);
        
        // === МАЛО ЗВЁЗД (ФОН) ===
        const starCount = 1500;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) { starPos[i*3] = (Math.random() - 0.5) * 140; starPos[i*3+1] = (Math.random() - 0.5) * 80; starPos[i*3+2] = (Math.random() - 0.5) * 50 - 25; }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // === АНИМАЦИЯ ===
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            coronaMaterial.uniforms.uTime.value = time;
            if (particles) particles.rotation.y = time * 0.02;
            stars.rotation.y = time * 0.003;
            effectComposer.render();
        }
        animate();
        
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); effectComposer.setSize(window.innerWidth, window.innerHeight); });
        
        function updateCategory(cat) {
            if (cat === 'love') currentCorona = coronaColors.love;
            else if (cat === 'work') currentCorona = coronaColors.work;
            else currentCorona = coronaColors.money;
            coronaMaterial.uniforms.uBase.value = new THREE.Color(currentCorona.base[0], currentCorona.base[1], currentCorona.base[2]);
            coronaMaterial.uniforms.uGlow.value = new THREE.Color(currentCorona.glow[0], currentCorona.glow[1], currentCorona.glow[2]);
            buildParticles(currentCorona);
        }
        
        function flashEffect() {
            coronaMaterial.uniforms.uTime.value = time + 0.6;
            if (particles) particles.material.opacity = 1.0;
            setTimeout(() => { if (particles) particles.material.opacity = 0.6; }, 350);
        }
        
        async function castSpell() {
            if (isCasting) return;
            if (used[activeCategory] >= 1) { hintText.textContent = '⚠️ Лимит на сегодня. Купи дополнительные вопросы.'; if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error'); return; }
            isCasting = true;
            used[activeCategory]++; saveUsed(); updateCounters();
            flashEffect();
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            hintText.textContent = '🔥 КОРОНА ВСПЫХИВАЕТ...';
            answerText.innerHTML = '✨';
            await new Promise(r => setTimeout(r, 1100));
            currentAnswer = getRandomPrediction();
            answerText.innerHTML = currentAnswer;
            hintText.textContent = '✨ ПРЕДСКАЗАНИЕ ГОТОВО ✨';
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            isCasting = false;
        }
        
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const newCat = btn.dataset.cat;
                activeCategory = newCat;
                updateCategory(newCat);
                hintText.textContent = `🎯 ${btn.innerHTML}`;
                answerText.innerHTML = 'ВЕДЬМА СКАЗАЛА';
            });
        });
        
        window.addEventListener('click', (e) => { if (e.target.classList && (e.target.classList.contains('category-btn') || e.target.classList.contains('action-btn'))) return; castSpell(); });
        document.getElementById('buyBtn').addEventListener('click', buyQuestions);
        document.getElementById('shareBtn').addEventListener('click', sharePrediction);
        document.getElementById('inviteBtn').addEventListener('click', inviteFriend);
        
        loadData();
        if (tg) tg.expand();
        console.log('🌑 Чёрное солнце с кинематографичной короной готово');
    </script>
</body>
</html>
