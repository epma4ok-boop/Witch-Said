<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0515" />
  <title>Ведьма сказала | Магический шар судьбы</title>
  <meta name="description" content="Премиум гадание на магическом шаре. Ответы ведьмы, которые попадают в самое сердце." />
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-deep: #05030b;
      --bg-mid: #0d0718;
      --bg-surface: rgba(18, 12, 32, 0.6);
      --accent-love: #ff6b9d;
      --accent-money: #ffd166;
      --accent-work: #4dc9f6;
      --accent-default: #b26bff;
      --accent-glow: rgba(178, 107, 255, 0.5);
      --text-primary: #faf5ff;
      --text-secondary: #b9a9d9;
      --text-muted: #7a6a99;
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-border-light: rgba(255, 255, 255, 0.12);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(ellipse at 30% 20%, #1a0f2e 0%, #05030b 70%, #020108 100%);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Анимированные звёзды */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle 3s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.8; transform: scale(1); }
    }

    /* Дым параллакс */
    .smoke-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(circle at 20% 40%, rgba(100, 50, 150, 0.15) 0%, transparent 50%);
      filter: blur(40px);
      animation: drift 20s ease-in-out infinite;
    }
    .smoke-layer:nth-child(2) {
      background: radial-gradient(circle at 80% 60%, rgba(80, 40, 120, 0.12) 0%, transparent 60%);
      animation: drift 25s ease-in-out reverse infinite;
      filter: blur(50px);
    }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(2%, 1%) scale(1.05); }
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 20px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 560px;
      margin: 0 auto;
      backdrop-filter: blur(2px);
    }

    /* Header с ведьмой */
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .hero-section {
      flex: 1;
    }
    .hero-kicker {
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent-default);
      font-weight: 500;
      margin-bottom: 6px;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      line-height: 1.2;
      background: linear-gradient(135deg, #fff, #d4b8ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .witch-avatar {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(178, 107, 255, 0.2), rgba(178, 107, 255, 0.05));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      animation: float 3s ease-in-out infinite;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .witch-avatar:hover {
      transform: scale(1.05);
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* Языковой переключатель */
    .lang-switch {
      display: flex;
      gap: 4px;
      background: var(--bg-surface);
      padding: 4px;
      border-radius: 60px;
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
    }
    .lang {
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang.active {
      background: rgba(178, 107, 255, 0.25);
      color: white;
    }

    /* Карточка шара — премиум */
    .orb-card {
      position: relative;
      background: linear-gradient(135deg, rgba(20, 12, 36, 0.7), rgba(10, 5, 20, 0.8));
      border-radius: 48px;
      padding: 28px 20px;
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 45px -15px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .orb-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* Магический шар */
    .orb-container {
      position: relative;
      width: min(270px, 72vw);
      height: min(270px, 72vw);
    }
    .orb-stage {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      cursor: pointer;
      outline: none;
      position: relative;
      transition: transform 0.2s ease;
    }
    .orb-stage:active {
      transform: scale(0.96);
    }
    .orb {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff 0%, #f3e0ff 15%, #c88bff 45%, #5a2a8a 75%, #1a0a2a 100%);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.15), 0 30px 50px rgba(0, 0, 0, 0.6), inset 0 -10px 20px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.3s;
    }
    /* Блики на шаре */
    .orb::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 25% 25%, rgba(255, 255, 255, 0.5) 0%, transparent 60%);
      opacity: 0.6;
      pointer-events: none;
    }
    .orb::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 70% 70%, rgba(0, 0, 0, 0.3) 0%, transparent 70%);
      pointer-events: none;
    }
    /* Пульсация шара в idle */
    .orb-stage:not(.casting-active) .orb {
      animation: pulseGlow 3s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.15), 0 30px 50px rgba(0, 0, 0, 0.6), inset 0 -10px 20px rgba(0, 0, 0, 0.3); }
      50% { box-shadow: 0 0 0 5px rgba(178, 107, 255, 0.4), 0 35px 60px rgba(0, 0, 0, 0.7), inset 0 -10px 20px rgba(0, 0, 0, 0.3); }
    }

    .orb-text {
      position: absolute;
      inset: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      color: #1a052a;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.5);
      z-index: 2;
      font-size: clamp(18px, 5vw, 38px);
      line-height: 1.1;
      max-width: 11ch;
      margin: 0 auto;
    }
    .orb-line {
      display: block;
      opacity: 0;
      transform: translateY(10px);
      animation: lineReveal 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
    }
    @keyframes lineReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Партиклы при колдовстве */
    .particles {
      position: absolute;
      inset: -20px;
      pointer-events: none;
      border-radius: 50%;
    }
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: radial-gradient(circle, #fff, #b26bff);
      border-radius: 50%;
      opacity: 0;
    }
    @keyframes particleBurst {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
    }

    .witch-line {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      padding: 8px 16px;
      background: rgba(10, 5, 20, 0.6);
      border-radius: 60px;
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      max-width: 280px;
    }

    /* Категории — премиум с иконками */
    .section-hint {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 8px;
    }
    .chip {
      background: rgba(18, 12, 32, 0.7);
      border: 1px solid var(--glass-border);
      border-radius: 40px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .chip::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.5;
    }
    .chip.active {
      background: linear-gradient(135deg, rgba(178, 107, 255, 0.25), rgba(178, 107, 255, 0.1));
      border-color: rgba(178, 107, 255, 0.6);
      color: white;
      box-shadow: 0 0 15px rgba(178, 107, 255, 0.3);
    }
    .chip.active::before {
      opacity: 1;
      background: var(--accent-default);
      box-shadow: 0 0 6px var(--accent-default);
    }

    /* Кнопки */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }
    .btn {
      border: none;
      padding: 14px 20px;
      border-radius: 60px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .btn-primary {
      background: linear-gradient(135deg, #b26bff, #8b3fdf);
      color: white;
      box-shadow: 0 4px 15px rgba(178, 107, 255, 0.4);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(178, 107, 255, 0.5);
    }
    .btn-secondary {
      background: rgba(18, 12, 32, 0.8);
      border: 1px solid var(--glass-border-light);
      color: var(--text-primary);
      backdrop-filter: blur(10px);
    }
    .btn-secondary:hover {
      background: rgba(178, 107, 255, 0.15);
      border-color: rgba(178, 107, 255, 0.4);
    }
    .btn:disabled {
      opacity: 0.5;
      transform: none;
    }

    .footer-note {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 16px;
      letter-spacing: 0.3px;
    }

    /* Casting анимация */
    .stage.casting .orb {
      animation: castPulse 0.8s ease-in-out infinite;
      box-shadow: 0 0 60px rgba(178, 107, 255, 0.8), 0 30px 50px rgba(0, 0, 0, 0.6);
    }
    @keyframes castPulse {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.02); filter: brightness(1.2); }
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(178, 107, 255, 0.15), transparent);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      border-radius: 48px;
    }
    .overlay.show {
      opacity: 1;
    }

    @media (max-width: 480px) {
      .app { padding: 16px; }
      .hero-title { font-size: 22px; }
      .orb-card { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="smoke-layer"></div>
  <div class="smoke-layer"></div>

  <div class="app">
    <header class="app-header">
      <div class="hero-section">
        <div class="hero-kicker" data-i18n="heroKicker">Ответ шара</div>
        <h1 class="hero-title" data-i18n="heroText">Нажми на шар —<br>и узнай судьбу</h1>
      </div>
      <div class="witch-avatar" id="witchAvatar">🧙‍♀️</div>
      <div class="lang-switch">
        <button class="lang active" data-lang="ru">RU</button>
        <button class="lang" data-lang="en">EN</button>
      </div>
    </header>

    <div class="orb-card" id="stage">
      <div class="orb-wrapper">
        <div class="orb-container">
          <div class="orb-stage" id="orbStage" tabindex="0">
            <div class="orb">
              <div class="orb-text" id="orbText"></div>
            </div>
            <div class="particles" id="particles"></div>
          </div>
        </div>
        <div class="witch-line" id="witchLine">Коснись шара — начни ритуал</div>
      </div>
      <div class="overlay" id="overlay"></div>
    </div>

    <div class="controls">
      <div class="section-hint" id="hint">Что хочешь узнать?</div>
      <div class="chips">
        <button class="chip active" data-key="all">Все сферы</button>
        <button class="chip" data-key="love">💗 Любовь</button>
        <button class="chip" data-key="work">💼 Работа</button>
        <button class="chip" data-key="money">💰 Деньги</button>
      </div>

      <div class="actions">
        <button id="shareBtn" class="btn btn-primary">📤 Поделиться ответом</button>
        <button id="againBtn" class="btn btn-secondary" style="display: none;">🎭 Другой вопрос</button>
      </div>

      <div class="footer-note" data-i18n="footerNote">Магия внутри. Нажми — и шар заговорит</div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Генерация звёзд
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.width = Math.random() * 2 + 1 + 'px';
      star.style.height = star.style.width;
      star.style.animationDelay = Math.random() * 5 + 's';
      star.style.animationDuration = 2 + Math.random() * 3 + 's';
      starsContainer.appendChild(star);
    }

    // Партиклы при клике
    function createParticles(event) {
      const container = document.getElementById('particles');
      if (!container) return;
      container.innerHTML = '';
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const angle = Math.random() * Math.PI * 2;
        const distance = 40 + Math.random() * 60;
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance;
        p.style.setProperty('--tx', tx + 'px');
        p.style.setProperty('--ty', ty + 'px');
        p.style.left = '50%';
        p.style.top = '50%';
        p.style.animation = `particleBurst 0.6s ease-out forwards`;
        p.style.animationDelay = Math.random() * 0.1 + 's';
        container.appendChild(p);
      }
      setTimeout(() => {
        if (container) container.innerHTML = '';
      }, 600);
    }

    const orb = document.getElementById('orbStage');
    orb.addEventListener('click', () => {
      if (!window.castingActive) createParticles();
    });
  </script>
</body>
</html>
