<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#120f1d" />
  <title>Ведьма сказала</title>
  <meta name="description" content="Telegram Web App с ведьмой и магическим шаром: предсказание появляется только внутри шара, с полноэкранным ритуалом." />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05030b;
  --bg-alt: #0d0718;
  --accent: #b26bff;
  --accent-soft: rgba(178, 107, 255, 0.3);
  --accent-strong: rgba(178, 107, 255, 0.9);
  --accent-secondary: #56d3ff;
  --text-main: #f5f0ff;
  --text-muted: #a590c2;
  --chip-bg: rgba(26, 20, 46, 0.9);
  --chip-border: rgba(255, 255, 255, 0.06);
  --chip-active-bg: rgba(178, 107, 255, 0.22);
  --chip-active-border: rgba(178, 107, 255, 0.8);
  --btn-primary-bg: linear-gradient(135deg, #b26bff, #ff7ac2);
  --btn-primary-glow: 0 0 18px rgba(178, 107, 255, 0.75);
  --btn-ghost-bg: rgba(17, 10, 34, 0.8);
  --border-radius-xl: 24px;
  --border-radius-pill: 999px;
  --transition-fast: 160ms ease-out;
  --transition-slow: 260ms ease-out;
  --orb-font-size: clamp(23px, 6vw, 42px);
  --orb-max-width: 9ch;
  --orb-line-height: 0.96;
  --orb-letter-spacing: -0.03em;
}

/* RESET */

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
    "Roboto", "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #2b1542 0, #05030b 48%, #000 100%);
  color: var(--text-main);
  -webkit-font-smoothing: antialiased;
}

/* APP LAYOUT */

.app {
  min-height: 100vh;
  padding: 16px 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 540px;
  margin: 0 auto;
}

/* HEADER */

.app-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding: 4px 2px 0;
}

.hero-copy {
  max-width: 80%;
}

.hero-kicker {
  margin: 0 0 4px;
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent-secondary);
}

.hero-title {
  margin: 0;
  font-size: 22px;
  line-height: 1.15;
  letter-spacing: -0.02em;
}

/* LANG SWITCH */

.lang-switch {
  display: inline-flex;
  align-items: center;
  padding: 3px;
  border-radius: 999px;
  background: rgba(11, 7, 28, 0.85);
  box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06);
}

.lang {
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 8px;
  border-radius: 999px;
  cursor: pointer;
  transition: background var(--transition-fast),
    color var(--transition-fast),
    transform var(--transition-fast);
}

.lang.active {
  background: rgba(178, 107, 255, 0.18);
  color: var(--text-main);
  transform: translateY(-0.5px);
}

/* MAIN */

.app-main {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* STAGE */

.stage {
  position: relative;
  border-radius: var(--border-radius-xl);
  background: radial-gradient(circle at 10% 0, #2c1747 0, #0b0616 40%, #050309 100%);
  overflow: hidden;
  padding: 18px 14px 16px;
  box-shadow:
    0 20px 50px rgba(0, 0, 0, 0.85),
    0 0 0 1px rgba(255, 255, 255, 0.05);
  isolation: isolate;
}

.stage-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.stage-glow {
  position: absolute;
  inset: 45% -20%;
  background: radial-gradient(circle at center, rgba(178, 107, 255, 0.35), transparent 70%);
  opacity: 0.9;
  filter: blur(12px);
}

.stage-smoke {
  position: absolute;
  inset: 20% -20%;
  background:
    radial-gradient(circle at 15% 0, rgba(255, 255, 255, 0.04), transparent 55%),
    radial-gradient(circle at 85% 10%, rgba(255, 255, 255, 0.06), transparent 60%),
    radial-gradient(circle at 50% 90%, rgba(255, 255, 255, 0.04), transparent 60%);
  mix-blend-mode: screen;
  opacity: 0.6;
  filter: blur(10px);
}

/* WITCH */

.witch {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  opacity: 0.35;
  transform: translateY(-8px);
}

.witch img {
  max-width: 70%;
  height: auto;
  object-fit: contain;
  filter: drop-shadow(0 18px 40px rgba(0, 0, 0, 0.9));
}

.witch-fallback {
  width: 120px;
  height: 140px;
  border-radius: 40% 40% 50% 50%;
  background: radial-gradient(circle at 30% 0, #3b2a5f, #0c0614 70%);
  box-shadow:
    0 24px 45px rgba(0, 0, 0, 0.9),
    0 0 40px rgba(37, 18, 78, 0.9);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity var(--transition-slow), transform var(--transition-slow);
}

.witch-fallback.show {
  opacity: 0.8;
  transform: translateY(0);
}

/* ORB */

.orb-wrapper {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.orb-stage {
  position: relative;
  width: min(260px, 70vw);
  height: min(260px, 70vw);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  outline: none;
  transition: transform var(--transition-slow);
}

.orb-stage:active {
  transform: scale(0.97);
}

.orb {
  position: relative;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: radial-gradient(circle at 20% 0, #fff 0, #fbe7ff 10%, #f3c9ff 20%, #9f5fff 55%, #391758 85%, #13071d 100%);
  box-shadow:
    0 0 40px rgba(178, 107, 255, 0.7),
    0 20px 40px rgba(0, 0, 0, 0.85),
    0 0 0 2px rgba(255, 255, 255, 0.16);
  overflow: hidden;
}

.orb-core {
  position: absolute;
  inset: 14% 18%;
  border-radius: 50%;
  background:
    radial-gradient(circle at 20% 10%, rgba(255, 255, 255, 0.9), transparent 55%),
    radial-gradient(circle at 70% 70%, rgba(255, 188, 255, 0.65), transparent 60%);
  mix-blend-mode: screen;
  filter: blur(2px);
}

.orb-ring {
  position: absolute;
  inset: 4%;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.16);
  mix-blend-mode: screen;
}

.orb-ring-1 {
  box-shadow: 0 0 24px rgba(255, 255, 255, 0.5);
}

.orb-ring-2 {
  inset: 12%;
  border-color: rgba(255, 255, 255, 0.12);
}

.orb-text {
  position: absolute;
  inset: 26% 20%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  max-width: var(--orb-max-width);
  margin: 0 auto;
  font-size: var(--orb-font-size);
  line-height: var(--orb-line-height);
  letter-spacing: var(--orb-letter-spacing);
  color: #20072e;
  text-shadow:
    0 0 2px rgba(255, 255, 255, 0.9),
    0 0 16px rgba(255, 255, 255, 0.6);
  padding: 0 8px;
  font-weight: 600;
}

.orb-text span {
  display: block;
}

/* анимация появления строк предсказания */
.orb-line {
  opacity: 0;
  transform: translateY(8px);
  animation: orbLineIn 380ms var(--transition-slow) forwards;
}

.orb-line:nth-child(2) {
  animation-delay: 60ms;
}
.orb-line:nth-child(3) {
  animation-delay: 120ms;
}
.orb-line:nth-child(4) {
  animation-delay: 180ms;
}

@keyframes orbLineIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* WITCH LINE */

.witch-line {
  margin: 4px 0 0;
  padding: 4px 10px 6px;
  font-size: 12px;
  line-height: 1.4;
  color: var(--text-muted);
  border-radius: 999px;
  background: rgba(9, 5, 22, 0.9);
  border: 1px solid rgba(255, 255, 255, 0.04);
  backdrop-filter: blur(14px);
  max-width: 270px;
  text-align: center;
}

/* OVERLAY (каст ритуала) */

.overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 220ms ease-out;
}

.overlay.show {
  opacity: 1;
}

.overlay-glow {
  position: absolute;
  inset: 8% 10%;
  border-radius: var(--border-radius-xl);
  background:
    radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.16), transparent 55%),
    radial-gradient(circle at 50% 80%, rgba(178, 107, 255, 0.5), transparent 70%);
  mix-blend-mode: screen;
  filter: blur(14px);
}

/* каст сцена */

.stage.casting .orb-stage {
  transform: scale(1.04);
}

.stage.casting .orb {
  box-shadow:
    0 0 60px rgba(178, 107, 255, 1),
    0 26px 60px rgba(0, 0, 0, 0.95);
}

.stage.casting .stage-glow {
  opacity: 1;
}

/* CONTROLS */

.controls {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 12px 12px 0;
}

.section-hint {
  margin: 0 0 4px;
  font-size: 13px;
  color: var(--text-muted);
}

/* CHIPS */

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip {
  border: 1px solid var(--chip-border);
  background: var(--chip-bg);
  color: var(--text-muted);
  border-radius: var(--border-radius-pill);
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
  min-width: 0;
  transition:
    background var(--transition-fast),
    border-color var(--transition-fast),
    color var(--transition-fast),
    transform var(--transition-fast),
    box-shadow var(--transition-fast);
}

.chip.active {
  background: var(--chip-active-bg);
  border-color: var(--chip-active-border);
  color: var(--text-main);
  box-shadow: 0 0 18px var(--accent-soft);
  transform: translateY(-1px);
}

/* BUTTONS */

.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 4px;
}

.btn {
  flex: 1;
  border-radius: var(--border-radius-pill);
  border: none;
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition:
    transform var(--transition-fast),
    box-shadow var(--transition-fast),
    opacity 140ms ease-out,
    background var(--transition-fast),
    color var(--transition-fast);
}

.btn.primary {
  background-image: var(--btn-primary-bg);
  color: #160312;
  box-shadow: var(--btn-primary-glow);
}

.btn.ghost {
  background: var(--btn-ghost-bg);
  color: var(--text-main);
  box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08);
}

.btn:active {
  transform: translateY(1px) scale(0.98);
  box-shadow: 0 0 0 rgba(0, 0, 0, 0);
}

.btn:disabled {
  opacity: 0.5;
  cursor: default;
}

/* FOOTER NOTE */

.footer-note {
  margin: 6px 0 0;
  font-size: 12px;
  color: var(--text-muted);
}

/* RESPONSIVE */

@media (min-width: 480px) {
  .stage {
    padding: 24px 20px 20px;
  }

  .hero-title {
    font-size: 24px;
  }
}
</style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="hero-copy">
        <p class="hero-kicker" data-i18n="heroKicker">Ответ шара</p>
        <h1 class="hero-title" data-i18n="heroText">
          Нажми на шар — и смотри, что он скажет.
        </h1>
      </div>

      <div class="lang-switch">
        <button class="lang active" data-lang="ru">RU</button>
        <button class="lang" data-lang="en">EN</button>
      </div>
    </header>

    <main class="app-main">
      <section class="stage" id="stage">
        <div class="stage-bg">
          <div class="witch" id="witchImgWrapper">
            <img id="witchImg" src="./witch.png" alt="" loading="lazy" />
            <div id="witchFallback" class="witch-fallback"></div>
          </div>
          <div class="stage-glow"></div>
          <div class="stage-smoke"></div>
        </div>

        <div class="orb-wrapper">
          <div
            class="orb-stage"
            id="orbStage"
            tabindex="0"
            aria-label="Магический шар"
          >
            <div class="orb">
              <div class="orb-core"></div>
              <div class="orb-ring orb-ring-1"></div>
              <div class="orb-ring orb-ring-2"></div>
              <div class="orb-text" id="orbText"></div>
            </div>
          </div>

          <p class="witch-line" id="witchLine">
            Теперь экран работает как одна сцена, а не как набор разрозненных блоков.
          </p>
        </div>

        <div class="overlay" id="overlay">
          <div class="overlay-glow"></div>
        </div>
      </section>

      <section class="controls">
        <p class="section-hint" id="hint" data-i18n="sectionHint">
          Что хочешь узнать?
        </p>

        <div class="chips">
          <button class="chip active" data-key="all" data-i18n="chipAll">Все</button>
          <button class="chip" data-key="love" data-i18n="chipLove">Любовь</button>
          <button class="chip" data-key="work" data-i18n="chipWork">Работа</button>
          <button class="chip" data-key="money" data-i18n="chipMoney">Деньги</button>
        </div>

        <div class="actions">
          <button id="askBtn" class="btn primary" data-i18n="btnAsk">
            Запустить ритуал
          </button>
          <button id="shareBtn" class="btn ghost" data-i18n="btnShare">
            Поделиться ответом
          </button>
        </div>

        <p class="footer-note" data-i18n="footerNote">
          Шар шутит, но попадает странно метко.
        </p>
      </section>
    </main>
  </div>

  <script src="./app-2.js"></script>
</body>
</html>
