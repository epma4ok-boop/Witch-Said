<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>Ведьма сказала | Магический шар Теслы</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a1a;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Фон с глубокими звёздами */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, #1a1030 0%, #0a0a1a 60%, #050510 100%);
      z-index: -2;
    }
    .stars {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: starTwinkle 4s ease-in-out infinite;
    }
    @keyframes starTwinkle {
      0%, 100% { opacity: 0; transform: scale(0.3); }
      50% { opacity: 0.6; transform: scale(1); }
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 16px 32px;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* Шапка */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }
    .title-section { flex: 1; }
    .badge {
      font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; color: #9b6bff;
      font-weight: 500; margin-bottom: 8px;
    }
    .main-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-weight: 600;
      background: linear-gradient(135deg, #fff, #d4b8ff, #9b6bff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.2;
    }
    .lang-switch {
      display: flex; gap: 6px;
      background: rgba(255,255,255,0.05);
      padding: 4px; border-radius: 60px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .lang {
      border: none; background: transparent;
      color: #8a7a9a; font-size: 11px; font-weight: 600;
      padding: 6px 12px; border-radius: 60px;
      cursor: pointer;
    }
    .lang.active { background: rgba(155,107,255,0.3); color: white; }

    /* Карточка шара */
    .magic-card {
      background: linear-gradient(135deg, rgba(25,15,45,0.4), rgba(15,8,30,0.5));
      border-radius: 56px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 20px;
      padding: 24px 20px;
    }

    /* ----- Обновлённый шар Теслы (гиперреалистичный) ----- */
    .orb-container {
      position: relative;
      width: 260px;
      height: 260px;
      margin: 0 auto 16px;
      cursor: pointer;
    }

    .orb-shape {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, 
        rgba(255, 255, 255, 0.9) 0%,
        rgba(230, 210, 255, 0.5) 15%,
        rgba(155, 107, 255, 0.25) 40%,
        rgba(80, 50, 130, 0.6) 70%,
        rgba(30, 15, 60, 0.95) 100%);
      box-shadow: 
        0 0 0 3px rgba(255, 255, 255, 0.5),
        0 0 0 8px rgba(155, 107, 255, 0.2),
        0 25px 45px rgba(0, 0, 0, 0.6),
        inset 0 -25px 35px rgba(0, 0, 0, 0.5),
        inset 0 15px 25px rgba(255, 255, 255, 0.3),
        inset 0 0 40px rgba(155, 107, 255, 0.3);
      transition: transform 0.2s, box-shadow 0.3s;
      backdrop-filter: blur(1px);
    }
    .orb-shape:active { transform: scale(0.97); }
    .orb-shape.casting {
      animation: castPulse 0.6s ease-in-out;
    }
    @keyframes castPulse {
      0% { transform: scale(1); box-shadow: 0 0 0 3px rgba(255,255,255,0.5), 0 25px 45px rgba(0,0,0,0.6); }
      50% { transform: scale(1.04); box-shadow: 0 0 0 10px rgba(255,255,255,0.6), 0 0 50px #b77eff; }
      100% { transform: scale(1); }
    }

    .orb-inner {
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.2), transparent 70%);
      pointer-events: none;
    }
    .orb-glow-inner {
      position: absolute;
      inset: -15%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(155,107,255,0.4), transparent 70%);
      filter: blur(15px);
      opacity: 0.6;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    /* Текст внутри шара */
    .orb-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 700;
      color: #140a1f;
      text-shadow: 0 0 15px rgba(255,255,255,0.9);
      padding: 20px;
      z-index: 5;
      backdrop-filter: blur(2px);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.1), transparent 70%);
    }
    .orb-line {
      display: block;
      opacity: 0;
      transform: translateY(10px);
      animation: lineAppear 0.35s forwards;
      max-width: 85%;
      margin: 2px auto;
      font-size: clamp(14px, 5vw, 22px);
      line-height: 1.3;
    }
    @keyframes lineAppear {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Молнии (улучшенные) */
    .lightning {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 3;
      opacity: 0.7;
      mix-blend-mode: screen;
    }
    .bolt {
      stroke: url(#boltGrad);
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      filter: drop-shadow(0 0 6px #b77eff) drop-shadow(0 0 2px #fff);
      animation: flicker 2.2s infinite;
    }
    @keyframes flicker {
      0%, 77%, 83%, 88%, 100% { opacity: 0.4; stroke-width: 2; }
      80%, 85% { opacity: 1; stroke-width: 4; filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0 5px #9b6bff); }
    }
    .bolt2 { animation-delay: 0.7s; }
    .bolt3 { animation-delay: 1.4s; }
    .bolt4 { animation-delay: 2.1s; }
    .bolt5 { animation-delay: 1.1s; }
    .bolt6 { animation-delay: 1.8s; }

    .orb-shape.casting .lightning {
      animation: flashLightning 0.4s ease-out;
    }
    @keyframes flashLightning {
      0% { opacity: 0.4; }
      30% { opacity: 1; filter: brightness(1.6); }
      100% { opacity: 0.7; }
    }

    /* Искры и частицы */
    .sparks {
      position: absolute;
      inset: -20%;
      pointer-events: none;
      z-index: 4;
    }
    .spark {
      position: absolute;
      width: 5px;
      height: 5px;
      background: #ffd966;
      border-radius: 50%;
      filter: blur(1px);
      opacity: 0;
    }
    @keyframes sparkFly {
      0% { opacity: 1; transform: scale(1) translate(0, 0); }
      100% { opacity: 0; transform: scale(0) translate(var(--tx), var(--ty)); }
    }

    /* Плавающие магические частицы */
    .particle-spark {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #ffddaa;
      border-radius: 50%;
      filter: blur(1px);
      animation: floatSpark 4s infinite linear;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
    }
    @keyframes floatSpark {
      0% { transform: translateY(0) scale(0); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.6; }
      100% { transform: translateY(-30px) scale(1.2); opacity: 0; }
    }

    .witch-message {
      font-size: 13px;
      color: #b8a8d8;
      text-align: center;
      padding: 10px 20px;
      background: rgba(10,5,20,0.5);
      border-radius: 60px;
      backdrop-filter: blur(8px);
      max-width: 280px;
      margin: 0 auto;
    }

    /* Категории */
    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .chip {
      background: rgba(20,12,35,0.7);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 40px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      color: #b8a8d8;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
      flex: 1;
      text-align: center;
    }
    .chip.active {
      background: linear-gradient(135deg, rgba(155,107,255,0.3), rgba(155,107,255,0.15));
      border-color: rgba(155,107,255,0.6);
      color: white;
      box-shadow: 0 0 15px rgba(155,107,255,0.3);
    }

    /* Лимиты и кнопки */
    .limits {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      background: rgba(10,5,20,0.4);
      border-radius: 60px;
      padding: 12px 16px;
    }
    .limit-item {
      text-align: center;
      flex: 1;
    }
    .limit-label {
      font-size: 11px;
      color: #8a7a9a;
    }
    .limit-value {
      font-size: 16px;
      font-weight: 700;
      color: #9b6bff;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    .btn {
      border: none;
      padding: 12px 20px;
      border-radius: 60px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }
    .btn-primary {
      background: linear-gradient(135deg, #9b6bff, #7a3aaa);
      color: white;
      box-shadow: 0 4px 15px rgba(155,107,255,0.3);
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-secondary {
      background: rgba(20,12,35,0.8);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #6a5a8a;
      margin-top: 16px;
    }

    /* Заставка */
    .splash {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: radial-gradient(ellipse at 30% 20%, #1a1030 0%, #0a0a1a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease;
    }
    .splash.hide { opacity: 0; visibility: hidden; }
    .splash-content { text-align: center; animation: fadeInScale 1s ease-out; }
    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.9); filter: blur(8px); }
      to { opacity: 1; transform: scale(1); filter: blur(0); }
    }
    .splash-orb {
      width: 120px; height: 120px; margin: 0 auto;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(155,107,255,0.5));
      border-radius: 50%;
      animation: splashFloat 2s infinite;
    }
    @keyframes splashFloat {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .splash-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px; font-weight: 700;
      background: linear-gradient(135deg, #fff, #d4b8ff, #9b6bff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 24px;
      letter-spacing: 4px;
    }
    .splash-progress {
      width: 200px; height: 2px;
      background: rgba(155,107,255,0.2);
      margin: 32px auto 0;
    }
    .splash-progress-bar {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, #9b6bff, #c88bff);
    }
  </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="stars" id="stars"></div>

<div class="splash" id="splash">
  <div class="splash-content">
    <div class="splash-orb"></div>
    <div class="splash-title">ВЕДЬМА<br>СКАЗАЛА</div>
    <div class="splash-progress"><div class="splash-progress-bar" id="progressBar"></div></div>
  </div>
</div>

<div class="container" id="app">
  <div class="header">
    <div class="title-section">
      <div class="badge">⚡ МАГИЧЕСКИЙ ШАР ТЕСЛА</div>
      <h1 class="main-title">Коснись шара —<br>узнаешь ответ</h1>
    </div>
    <div class="lang-switch">
      <button class="lang active" data-lang="ru">RU</button>
      <button class="lang" data-lang="en">EN</button>
    </div>
  </div>

  <div class="magic-card">
    <div class="orb-container" id="orbContainer">
      <div class="orb-shape" id="orbShape">
        <div class="orb-inner"></div>
        <div class="orb-glow-inner"></div>
        <div class="orb-text" id="orbText">🔮</div>
      </div>
      <svg class="lightning" viewBox="0 0 200 200" preserveAspectRatio="none">
        <defs>
          <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fff" />
            <stop offset="40%" stop-color="#aaddff" />
            <stop offset="100%" stop-color="#9b6bff" />
          </linearGradient>
        </defs>
        <path class="bolt" d="M60,30 L80,70 L55,75 L90,120 L70,125 L110,170" />
        <path class="bolt bolt2" d="M140,40 L120,80 L145,85 L110,130 L130,135 L100,175" />
        <path class="bolt bolt3" d="M30,120 L55,110 L45,130 L75,125" />
        <path class="bolt bolt4" d="M170,110 L145,120 L155,140 L125,135" />
        <path class="bolt bolt5" d="M85,20 L95,45 L80,50 L100,70" />
        <path class="bolt bolt6" d="M115,155 L125,140 L135,150 L120,165" />
      </svg>
      <div class="sparks" id="sparks"></div>
      <!-- Плавающие магические частицы -->
      <div class="particle-spark" style="bottom: 15%; left: 10%; animation-delay: 0s;"></div>
      <div class="particle-spark" style="bottom: 25%; left: 85%; animation-delay: 1.2s;"></div>
      <div class="particle-spark" style="bottom: 60%; left: 8%; animation-delay: 0.7s;"></div>
      <div class="particle-spark" style="bottom: 70%; left: 88%; animation-delay: 2.5s;"></div>
      <div class="particle-spark" style="bottom: 40%; left: 15%; animation-delay: 1.9s;"></div>
      <div class="particle-spark" style="bottom: 55%; left: 92%; animation-delay: 3.1s;"></div>
    </div>
    <div class="witch-message" id="witchLine">Коснись шара, выбери тему</div>
  </div>

  <div class="chip-group">
    <button class="chip active" data-key="love">💗 Любовь</button>
    <button class="chip" data-key="work">💼 Работа</button>
    <button class="chip" data-key="money">💰 Деньги</button>
  </div>

  <div class="limits">
    <div class="limit-item"><div class="limit-label">💗 Любовь</div><div class="limit-value" id="limitLove">1</div></div>
    <div class="limit-item"><div class="limit-label">💼 Работа</div><div class="limit-value" id="limitWork">1</div></div>
    <div class="limit-item"><div class="limit-label">💰 Деньги</div><div class="limit-value" id="limitMoney">1</div></div>
  </div>

  <div class="btn-row">
    <button id="buyBtn" class="btn btn-secondary">⭐ Купить вопросы</button>
    <button id="inviteBtn" class="btn btn-secondary">👥 Пригласить</button>
  </div>
  <div class="btn-row">
    <button id="shareBtn" class="btn btn-primary">📤 Поделиться</button>
    <button id="againBtn" class="btn btn-secondary" style="display: none;">🎭 Другой ответ</button>
  </div>

  <div class="footer">Магия внутри. Нажми — шар заговорит</div>
</div>

<script>
  (function() {
    // DOM элементы
    const splash = document.getElementById('splash');
    const app = document.getElementById('app');
    const orbShape = document.getElementById('orbShape');
    const orbText = document.getElementById('orbText');
    const witchLine = document.getElementById('witchLine');
    const shareBtn = document.getElementById('shareBtn');
    const againBtn = document.getElementById('againBtn');
    const buyBtn = document.getElementById('buyBtn');
    const inviteBtn = document.getElementById('inviteBtn');
    const chips = document.querySelectorAll('.chip');
    const limitLove = document.getElementById('limitLove');
    const limitWork = document.getElementById('limitWork');
    const limitMoney = document.getElementById('limitMoney');
    const progressBar = document.getElementById('progressBar');

    // Состояние
    let currentLang = 'ru';
    let activeCategory = 'love';
    let used = { love: 0, work: 0, money: 0 };
    let currentAnswer = '';
    let isCasting = false;

    // Предсказания
    const predictions = {
      love: {
        ru: [
          "💗 Он напишет, когда закончится интернет. То есть никогда.",
          "💗 Вы будете вместе, если научишься терпеть его музыку.",
          "💗 Твоя любовь как криптовалюта: то взлетает, то обвал.",
          "💗 Отправь ему «Привет, забыл меня?» и наблюдай за тишиной.",
          "💗 Совместное будущее есть, но ты будешь мыть посуду.",
          "💗 Он уже сохранил твой номер как «Осторожно, ведьма».",
          "💗 Романтика начнётся с того, как он потеряет ключи."
        ],
        en: [
          "💗 He'll text when the internet ends. That is, never.",
          "💗 You'll be together if you learn to tolerate his music.",
          "💗 Your love is like crypto: it either soars or crashes.",
          "💗 Send him 'Hi, forgot me?' and watch the silence.",
          "💗 A shared future exists, but you'll do the dishes.",
          "💗 He already saved your number as 'Careful, witch'.",
          "💗 Romance will start when he loses his keys."
        ]
      },
      work: {
        ru: [
          "💼 Начальник заметит твою работу. Когда ты будешь в отпуске.",
          "💼 Повышение дадут тому, кто пьёт с ним кофе.",
          "💼 Твоя идея гениальна. Украдут через неделю.",
          "💼 Коллеги тайно завидуют. И явно тоже. Не расслабляйся.",
          "💼 Зарплату поднимут, когда научишься спать с открытыми глазами.",
          "💼 Проект выстрелит. Может быть, фейерверком.",
          "💼 Успех близко. Но сперва допей этот отчёт."
        ],
        en: [
          "💼 The boss will notice your work. When you're on vacation.",
          "💼 Promotion will go to whoever drinks coffee with him.",
          "💼 Your idea is brilliant. It'll be stolen in a week.",
          "💼 Colleagues secretly envy you. And openly too.",
          "💼 Your salary will rise when you learn to sleep with eyes open.",
          "💼 The project will take off. Perhaps as fireworks.",
          "💼 Success is near. But first, finish that report."
        ]
      },
      money: {
        ru: [
          "💰 Деньги придут неожиданно. Как налоги, только приятнее.",
          "💰 Твой бюджет худеет. Пора кормить его меньше.",
          "💰 Крупная покупка опустошит кошелёк. Зато будет радость.",
          "💰 Инвестируй в себя. Например, в этот шар — он окупится.",
          "💰 Финансовая удача уже рядом. Но не прокути.",
          "💰 Экономия — это тоже заработок, когда экономишь на кофе.",
          "💰 Премию дадут в конверте. Не перепутай с приглашением на свадьбу."
        ],
        en: [
          "💰 Money will come unexpectedly. Like taxes, but nicer.",
          "💰 Your budget is shrinking. Time to feed it less.",
          "💰 A big purchase will empty your wallet. But joy will remain.",
          "💰 Invest in yourself. For example, in this orb — it'll pay off.",
          "💰 Financial luck is near. But don't splurge.",
          "💰 Saving is also earning, when you save on coffee.",
          "💰 The bonus will come in an envelope. Don't confuse it with a wedding invitation."
        ]
      }
    };

    function getRandomPrediction(cat) {
      const arr = predictions[cat][currentLang];
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function showAnswer(text) {
      const words = text.split(' ');
      const lines = [];
      let current = '';
      for (let w of words) {
        if ((current + ' ' + w).length > 20 && current) {
          lines.push(current);
          current = w;
        } else {
          current = current ? current + ' ' + w : w;
        }
      }
      if (current) lines.push(current);
      orbText.innerHTML = lines.map(l => `<span class="orb-line">${l}</span>`).join('');
    }

    function createSparks() {
      const container = document.getElementById('sparks');
      if (!container) return;
      container.innerHTML = '';
      for (let i = 0; i < 24; i++) {
        const s = document.createElement('div');
        s.className = 'spark';
        const angle = Math.random() * Math.PI * 2;
        const dist = 70 + Math.random() * 100;
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist;
        s.style.setProperty('--tx', tx + 'px');
        s.style.setProperty('--ty', ty + 'px');
        s.style.left = '50%';
        s.style.top = '50%';
        s.style.animation = `sparkFly 0.6s ease-out forwards`;
        s.style.animationDelay = Math.random() * 0.1 + 's';
        container.appendChild(s);
      }
      setTimeout(() => { if (container) container.innerHTML = ''; }, 700);
    }

    async function castSpell() {
      if (isCasting) return;
      if (used[activeCategory] >= 1) {
        witchLine.textContent = '⚠️ Бесплатный вопрос на сегодня использован. Купи дополнительные. ⭐';
        return;
      }
      isCasting = true;
      used[activeCategory]++;
      localStorage.setItem('witch_used', JSON.stringify(used));
      updateLimits();

      orbShape.classList.add('casting');
      witchLine.textContent = '⚡ Смотрю в шар...';
      orbText.innerHTML = '✨';
      createSparks();

      await new Promise(r => setTimeout(r, 1200));

      currentAnswer = getRandomPrediction(activeCategory);
      showAnswer(currentAnswer);
      witchLine.textContent = '✨ Вот что сказала ведьма ✨';
      orbShape.classList.remove('casting');
      againBtn.style.display = 'block';
      shareBtn.dataset.text = currentAnswer;
      isCasting = false;
    }

    function updateLimits() {
      limitLove.textContent = 1 - used.love;
      limitWork.textContent = 1 - used.work;
      limitMoney.textContent = 1 - used.money;
    }

    function loadData() {
      const saved = localStorage.getItem('witch_used');
      if (saved) {
        try { used = JSON.parse(saved); } catch(e) {}
      }
      const lastDate = localStorage.getItem('witch_date');
      const today = new Date().toDateString();
      if (lastDate !== today) {
        used = { love: 0, work: 0, money: 0 };
        localStorage.setItem('witch_date', today);
        saveUsed();
      }
      updateLimits();
    }
    function saveUsed() { localStorage.setItem('witch_used', JSON.stringify(used)); }

    function shareAnswer() {
      const text = shareBtn.dataset.text || currentAnswer;
      if (window.Telegram?.WebApp?.openTelegramLink) {
        window.Telegram.WebApp.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent('https://t.me/place_bot')}&text=${encodeURIComponent('🔮 ' + text + ' 🔮')}`);
      } else {
        alert('🔮 ' + text);
      }
    }
    function anotherAnswer() { if (!isCasting && used[activeCategory] < 1) castSpell(); }
    function buyQuestions() { alert('⭐ Покупка вопросов через Telegram Stars\nСкоро появится!'); }
    function inviteFriend() { alert('👥 Пригласи друга:\nhttps://t.me/place_bot?start=ref'); }

    // Обработчики
    document.getElementById('orbContainer').addEventListener('click', castSpell);
    shareBtn.addEventListener('click', shareAnswer);
    againBtn.addEventListener('click', anotherAnswer);
    buyBtn.addEventListener('click', buyQuestions);
    inviteBtn.addEventListener('click', inviteFriend);

    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        chips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeCategory = chip.dataset.key;
        witchLine.textContent = `🔮 Выбрана сфера: ${chip.textContent.trim()}`;
        againBtn.style.display = 'none';
        orbText.innerHTML = '🔮';
      });
    });

    // Переключение языка
    document.querySelectorAll('.lang').forEach(btn => {
      btn.addEventListener('click', () => {
        const newLang = btn.dataset.lang;
        if (newLang === currentLang) return;
        currentLang = newLang;
        document.querySelectorAll('.lang').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        orbText.innerHTML = '🔮';
        witchLine.textContent = 'Коснись шара, выбери тему';
      });
    });

    // Заставка
    let progress = 0;
    const interval = setInterval(() => {
      progress += Math.random() * 15 + 5;
      if (progress >= 100) {
        progress = 100;
        clearInterval(interval);
        progressBar.style.width = '100%';
        setTimeout(() => {
          splash.classList.add('hide');
          setTimeout(() => {
            splash.style.display = 'none';
            if (window.Telegram?.WebApp) {
              window.Telegram.WebApp.ready();
              window.Telegram.WebApp.expand();
            }
          }, 600);
        }, 400);
      }
      progressBar.style.width = progress + '%';
    }, 150);

    // Генерация звёзд
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.width = Math.random() * 2 + 1 + 'px';
      star.style.height = star.style.width;
      star.style.animationDelay = Math.random() * 5 + 's';
      star.style.animationDuration = 2 + Math.random() * 4 + 's';
      starsContainer.appendChild(star);
    }

    loadData();
    orbText.innerHTML = '🔮';
  })();
</script>
</body>
</html>
