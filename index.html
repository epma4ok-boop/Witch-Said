<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>Ведьма сказала | Магический шар судьбы</title>
  <meta name="description" content="Премиум гадание на магическом шаре. Ведьма знает ответ." />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a1a;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== ДИНАМИЧЕСКИЙ ФОН С ПАРАЛЛАКСОМ ===== */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: radial-gradient(ellipse at 30% 20%, #1a1030 0%, #0a0a1a 60%, #050510 100%);
    }
    
    .stars {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }
    
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: starTwinkle 4s ease-in-out infinite;
    }
    
    @keyframes starTwinkle {
      0%, 100% { opacity: 0; transform: scale(0.3); }
      50% { opacity: 0.7; transform: scale(1); }
    }
    
    .aurora {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background: radial-gradient(circle at 20% 50%, rgba(100, 50, 150, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(50, 100, 150, 0.1) 0%, transparent 60%);
      filter: blur(60px);
    }

    /* ===== ОСНОВНОЙ КОНТЕЙНЕР ===== */
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 16px 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }
    
    .title-section {
      flex: 1;
    }
    
    .badge {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #9b6bff;
      font-weight: 500;
      margin-bottom: 8px;
    }
    
    .main-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      background: linear-gradient(135deg, #fff, #d4b8ff, #9b6bff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.2;
    }
    
    .lang-switch {
      display: flex;
      gap: 6px;
      background: rgba(255, 255, 255, 0.05);
      padding: 4px;
      border-radius: 60px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .lang {
      border: none;
      background: transparent;
      color: #8a7a9a;
      font-size: 11px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .lang.active {
      background: rgba(155, 107, 255, 0.3);
      color: white;
    }

    /* ===== МАГИЧЕСКАЯ КАРТОЧКА ===== */
    .magic-card {
      background: linear-gradient(135deg, rgba(25, 15, 45, 0.7), rgba(15, 8, 30, 0.8));
      border-radius: 56px;
      padding: 32px 24px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 45px -15px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      margin-bottom: 24px;
    }

    /* ===== ШАР ===== */
    .orb-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    
    .orb-container {
      position: relative;
      width: 260px;
      height: 260px;
      margin-bottom: 20px;
    }
    
    .orb-glow {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(155, 107, 255, 0.3), transparent 70%);
      opacity: 0.5;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    
    .orb {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff, #f0e0ff, #c88bff, #7a3aaa, #2a1a4a);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.15), 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 -10px 20px rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    
    .orb::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 25% 25%, rgba(255, 255, 255, 0.4), transparent 60%);
      pointer-events: none;
    }
    
    .orb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 70% 70%, rgba(0, 0, 0, 0.2), transparent 70%);
      pointer-events: none;
    }
    
    .orb:active {
      transform: scale(0.96);
    }
    
    .orb-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 700;
      color: #1a052a;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.8);
      text-align: center;
      padding: 20px;
      z-index: 2;
      max-width: 85%;
    }
    
    .orb-line {
      display: block;
      opacity: 0;
      transform: translateY(12px);
      animation: lineAppear 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
    }
    
    @keyframes lineAppear {
      to { opacity: 1; transform: translateY(0); }
    }
    
    .orb-line:nth-child(2) { animation-delay: 0.05s; }
    .orb-line:nth-child(3) { animation-delay: 0.1s; }
    .orb-line:nth-child(4) { animation-delay: 0.15s; }
    
    /* Анимация колдовства */
    .orb.casting {
      animation: castPulse 0.8s ease-in-out infinite;
    }
    
    @keyframes castPulse {
      0%, 100% { transform: scale(1); filter: brightness(1); box-shadow: 0 0 0 3px rgba(255,255,255,0.15), 0 20px 40px rgba(0,0,0,0.5); }
      50% { transform: scale(1.02); filter: brightness(1.2); box-shadow: 0 0 0 5px rgba(155,107,255,0.4), 0 25px 50px rgba(0,0,0,0.6); }
    }
    
    .witch-message {
      font-size: 13px;
      color: #b8a8d8;
      text-align: center;
      padding: 10px 20px;
      background: rgba(10, 5, 20, 0.5);
      border-radius: 60px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      max-width: 280px;
      margin: 0 auto;
    }

    /* ===== КАТЕГОРИИ ===== */
    .categories {
      margin-bottom: 20px;
    }
    
    .categories-label {
      font-size: 12px;
      color: #8a7a9a;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }
    
    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .chip {
      background: rgba(20, 12, 35, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 40px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: #b8a8d8;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
    }
    
    .chip:hover {
      background: rgba(155, 107, 255, 0.2);
      transform: translateY(-1px);
    }
    
    .chip.active {
      background: linear-gradient(135deg, rgba(155, 107, 255, 0.3), rgba(155, 107, 255, 0.15));
      border-color: rgba(155, 107, 255, 0.6);
      color: white;
      box-shadow: 0 0 15px rgba(155, 107, 255, 0.3);
    }

    /* ===== КНОПКИ ===== */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .btn-row {
      display: flex;
      gap: 12px;
    }
    
    .btn {
      border: none;
      padding: 14px 20px;
      border-radius: 60px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      flex: 1;
      text-align: center;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #9b6bff, #7a3aaa);
      color: white;
      box-shadow: 0 4px 15px rgba(155, 107, 255, 0.3);
    }
    
    .btn-primary:active {
      transform: scale(0.98);
      box-shadow: 0 2px 10px rgba(155, 107, 255, 0.2);
    }
    
    .btn-secondary {
      background: rgba(20, 12, 35, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      backdrop-filter: blur(8px);
    }
    
    .btn-secondary:active {
      transform: scale(0.98);
    }
    
    .btn-secondary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===== СЧЁТЧИК И ФУТЕР ===== */
    .counter {
      text-align: center;
      padding: 12px;
      background: rgba(155, 107, 255, 0.08);
      border-radius: 60px;
      margin-bottom: 16px;
    }
    
    .counter-text {
      font-size: 13px;
      color: #b8a8d8;
    }
    
    .counter-value {
      font-weight: 700;
      color: #9b6bff;
      font-size: 16px;
    }
    
    .footer {
      text-align: center;
      font-size: 11px;
      color: #6a5a8a;
      margin-top: 8px;
    }

    /* ===== ЗАСТАВКА ===== */
    .splash {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: radial-gradient(ellipse at 30% 20%, #1a1030 0%, #0a0a1a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease, visibility 0s linear 0.6s;
    }
    
    .splash.hide {
      opacity: 0;
      visibility: hidden;
    }
    
    .splash-content {
      text-align: center;
      animation: splashAppear 1s ease-out;
    }
    
    @keyframes splashAppear {
      from { opacity: 0; transform: scale(0.9); filter: blur(8px); }
      to { opacity: 1; transform: scale(1); filter: blur(0); }
    }
    
    .splash-orb {
      width: 120px;
      height: 120px;
      margin: 0 auto;
      background: radial-gradient(circle at 30% 30%, #fff, #f0e0ff, #c88bff, #7a3aaa);
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(155, 107, 255, 0.5);
      animation: splashFloat 2s ease-in-out infinite;
    }
    
    @keyframes splashFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    
    .splash-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #d4b8ff, #9b6bff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 24px;
      letter-spacing: 4px;
    }
    
    .splash-sub {
      font-size: 11px;
      color: #8a7a9a;
      letter-spacing: 4px;
      margin-top: 8px;
    }
    
    .splash-progress {
      width: 200px;
      height: 2px;
      background: rgba(155, 107, 255, 0.2);
      border-radius: 4px;
      margin-top: 32px;
      margin-left: auto;
      margin-right: auto;
      overflow: hidden;
    }
    
    .splash-progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #9b6bff, #c88bff);
      transition: width 0.2s ease;
    }
    
    /* Адаптация */
    @media (max-width: 450px) {
      .orb-container { width: 220px; height: 220px; }
      .btn-row { flex-direction: column; gap: 10px; }
      .main-title { font-size: 24px; }
      .magic-card { padding: 24px 16px; }
    }
  </style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="stars" id="stars"></div>
<div class="aurora"></div>

<!-- ЗАСТАВКА -->
<div class="splash" id="splash">
  <div class="splash-content">
    <div class="splash-orb"></div>
    <div class="splash-title">ВЕДЬМА<br>СКАЗАЛА</div>
    <div class="splash-sub">MAGIC ORACLE</div>
    <div class="splash-progress">
      <div class="splash-progress-bar" id="progressBar"></div>
    </div>
  </div>
</div>

<!-- ОСНОВНОЙ КОНТЕНТ -->
<div class="container" id="app">
  
  <div class="header">
    <div class="title-section">
      <div class="badge">✨ МАГИЧЕСКИЙ ШАР</div>
      <h1 class="main-title">Коснись шара —<br>узнаешь ответ</h1>
    </div>
    <div class="lang-switch">
      <button class="lang active" data-lang="ru">RU</button>
      <button class="lang" data-lang="en">EN</button>
    </div>
  </div>

  <div class="magic-card">
    <div class="orb-wrapper">
      <div class="orb-container">
        <div class="orb-glow" id="orbGlow"></div>
        <div class="orb" id="orb">
          <div class="orb-text" id="orbText">🔮</div>
        </div>
      </div>
      <div class="witch-message" id="witchLine">Коснись магического шара, чтобы начать ритуал</div>
    </div>
  </div>

  <div class="categories">
    <div class="categories-label">🌙 ВЫБЕРИ СФЕРУ</div>
    <div class="chip-group">
      <button class="chip active" data-key="all">✨ Всё</button>
      <button class="chip" data-key="love">💗 Любовь</button>
      <button class="chip" data-key="work">💼 Работа</button>
      <button class="chip" data-key="money">💰 Деньги</button>
    </div>
  </div>

  <div class="buttons">
    <div class="btn-row">
      <button id="buyBtn" class="btn btn-secondary">⭐ Купить вопросы</button>
      <button id="inviteBtn" class="btn btn-secondary">👥 Пригласить</button>
    </div>
    <div class="btn-row">
      <button id="storyBtn" class="btn btn-secondary">📸 В сторис</button>
      <button id="skinBtn" class="btn btn-secondary">✨ Сменить скин</button>
    </div>
    <button id="shareBtn" class="btn btn-primary">📤 Поделиться ответом</button>
    <button id="againBtn" class="btn btn-secondary" style="display: none;">🎭 Другой ответ</button>
  </div>

  <div class="counter">
    <span class="counter-text">🔮 Сегодня осталось вопросов</span><br>
    <span class="counter-value" id="questionsLeft">3</span> <span class="counter-text">из 3</span>
  </div>

  <div class="footer">
    <span>Магия внутри. Нажми — и шар заговорит</span>
  </div>
</div>

<script>
  // ===== ВСЯ ЛОГИКА =====
  (function() {
    console.log('✨ Магический шар активирован');
    
    // DOM элементы
    const splash = document.getElementById('splash');
    const app = document.getElementById('app');
    const orb = document.getElementById('orb');
    const orbText = document.getElementById('orbText');
    const witchLine = document.getElementById('witchLine');
    const shareBtn = document.getElementById('shareBtn');
    const againBtn = document.getElementById('againBtn');
    const buyBtn = document.getElementById('buyBtn');
    const inviteBtn = document.getElementById('inviteBtn');
    const storyBtn = document.getElementById('storyBtn');
    const skinBtn = document.getElementById('skinBtn');
    const questionsLeftSpan = document.getElementById('questionsLeft');
    const chips = document.querySelectorAll('.chip');
    const orbGlow = document.getElementById('orbGlow');
    
    // Состояние
    let questionsLeft = 3;
    let activeCategory = 'all';
    let currentAnswer = '';
    let isCasting = false;
    
    // Расширенная база предсказаний
    const predictions = {
      all: [
        '✨ Звёзды говорят — да! ✨',
        '🌙 Пока неясно, спроси позже 🌙',
        '🔮 Нет, не судьба 🔮',
        '💫 Определённо да! 💫',
        '🍀 Всё будет хорошо 🍀',
        '🌟 Вселенная на твоей стороне 🌟',
        '⚡ Будь смелее — решение за тобой ⚡',
        '🌸 Скоро всё изменится к лучшему 🌸',
        '🌙 Доверься своей интуиции',
        '✨ Скоро узнаешь правду'
      ],
      love: [
        '💗 Он думает о тебе 💗',
        '💗 Судьба готовит встречу 💗',
        '💗 Не торопи события 💗',
        '💗 Сердце знает ответ 💗',
        '💗 Скоро важный разговор 💗',
        '💗 Любовь ближе, чем кажется 💗',
        '💗 Открой сердце новому чувству 💗'
      ],
      work: [
        '💼 Повышение близко 💼',
        '💼 Доверяй своей интуиции 💼',
        '💼 Перемены к лучшему 💼',
        '💼 Твой момент настанет 💼',
        '💼 Не бойся предлагать идеи 💼',
        '💼 Успех требует тишины и фокуса 💼',
        '💼 Твой труд будет вознаграждён 💼'
      ],
      money: [
        '💰 Деньги придут неожиданно 💰',
        '💰 Хороший период для инвестиций 💰',
        '💰 Будь щедрым — вернётся 💰',
        '💰 Удача на твоей стороне 💰',
        '💰 Мелкие траты складываются в большое💰',
        '💰 Денежный поток усиливается 💰',
        '💰 Придёт неожиданный доход 💰'
      ]
    };
    
    // Загрузка сохранённых данных
    function loadData() {
      const saved = localStorage.getItem('witch_questions');
      if (saved !== null) {
        questionsLeft = parseInt(saved);
      }
      const lastDate = localStorage.getItem('witch_date');
      const today = new Date().toDateString();
      if (lastDate !== today) {
        questionsLeft = 3;
        localStorage.setItem('witch_date', today);
      }
      updateCounter();
    }
    
    function saveQuestions() {
      localStorage.setItem('witch_questions', questionsLeft);
    }
    
    function updateCounter() {
      if (questionsLeftSpan) {
        questionsLeftSpan.textContent = questionsLeft;
      }
      if (questionsLeft <= 0 && orb) {
        orb.style.opacity = '0.6';
      } else if (orb) {
        orb.style.opacity = '1';
      }
      saveQuestions();
    }
    
    // Показать ответ с анимацией строк
    function showAnswer(text) {
      const words = text.split(' ');
      const lines = [];
      let current = '';
      
      for (const word of words) {
        if ((current + ' ' + word).length > 20 && current) {
          lines.push(current);
          current = word;
        } else {
          current = current ? current + ' ' + word : word;
        }
      }
      if (current) lines.push(current);
      
      orbText.innerHTML = lines.map(line => `<span class="orb-line">${line}</span>`).join('');
    }
    
    function getRandomPrediction() {
      const pool = predictions[activeCategory] || predictions.all;
      return pool[Math.floor(Math.random() * pool.length)];
    }
    
    // Основной ритуал
    async function castSpell() {
      if (isCasting) return;
      if (questionsLeft <= 0) {
        witchLine.textContent = '✨ Купи дополнительные вопросы или приходи завтра ✨';
        return;
      }
      
      isCasting = true;
      questionsLeft--;
      updateCounter();
      
      // Анимация
      orb.classList.add('casting');
      if (orbGlow) orbGlow.style.opacity = '0.9';
      witchLine.textContent = '🔮 Смотрю в хрустальный шар...';
      orbText.textContent = '✨';
      
      // Эффект вибрации
      if (window.Telegram?.WebApp?.HapticFeedback) {
        window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
      }
      
      await new Promise(r => setTimeout(r, 1200));
      
      // Ответ
      currentAnswer = getRandomPrediction();
      showAnswer(currentAnswer);
      witchLine.textContent = '✨ Вот что сказала ведьма ✨';
      
      orb.classList.remove('casting');
      if (orbGlow) orbGlow.style.opacity = '0.5';
      
      if (againBtn) againBtn.style.display = 'block';
      if (shareBtn) shareBtn.dataset.text = currentAnswer;
      
      if (window.Telegram?.WebApp?.HapticFeedback) {
        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
      }
      
      isCasting = false;
    }
    
    function shareAnswer() {
      const text = shareBtn?.dataset?.text || currentAnswer || 'Ведьма сказала магическое предсказание!';
      if (window.Telegram?.WebApp?.openTelegramLink) {
        window.Telegram.WebApp.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent('https://t.me/place_bot_username')}&text=${encodeURIComponent('🔮 ' + text + ' 🔮')}`);
      } else {
        alert(`🔮 ${text}`);
      }
    }
    
    function anotherAnswer() {
      if (!isCasting && questionsLeft > 0) {
        castSpell();
      }
    }
    
    function buyQuestions() {
      alert('⭐ Покупка вопросов через Telegram Stars\nБудет доступно после подключения платежей');
    }
    
    function inviteFriend() {
      const link = 'https://t.me/place_bot_username?start=ref';
      if (window.Telegram?.WebApp?.openTelegramLink) {
        window.Telegram.WebApp.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=🧙‍♀️ Приходи гадать на магическом шаре «Ведьма сказала»! Первые 3 вопроса бесплатно ✨`);
      } else {
        alert('👥 Пригласи друга:\n' + link);
      }
    }
    
    function shareToStory() {
      alert('📸 Генерация карточки для Stories\nСкоро!');
    }
    
    function changeSkin() {
      alert('✨ Скины шара появятся в следующем обновлении ✨');
    }
    
    // Смена категории
    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        chips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeCategory = chip.dataset.key;
        witchLine.textContent = `🔮 Выбрана сфера: ${chip.textContent.trim()}`;
      });
    });
    
    // Назначение обработчиков
    if (orb) orb.addEventListener('click', castSpell);
    if (shareBtn) shareBtn.addEventListener('click', shareAnswer);
    if (againBtn) againBtn.addEventListener('click', anotherAnswer);
    if (buyBtn) buyBtn.addEventListener('click', buyQuestions);
    if (inviteBtn) inviteBtn.addEventListener('click', inviteFriend);
    if (storyBtn) storyBtn.addEventListener('click', shareToStory);
    if (skinBtn) skinBtn.addEventListener('click', changeSkin);
    
    // Заставка с прогрессом
    let progress = 0;
    const progressBar = document.getElementById('progressBar');
    const interval = setInterval(() => {
      progress += Math.random() * 15 + 5;
      if (progress >= 100) {
        progress = 100;
        clearInterval(interval);
        if (progressBar) progressBar.style.width = '100%';
        setTimeout(() => {
          if (splash) {
            splash.classList.add('hide');
            setTimeout(() => {
              splash.style.display = 'none';
              // Активация Telegram
              if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
                window.Telegram.WebApp.setHeaderColor?.('#0a0a1a');
                window.Telegram.WebApp.setBackgroundColor?.('#0a0a1a');
              }
            }, 600);
          }
        }, 400);
      }
      if (progressBar) progressBar.style.width = progress + '%';
    }, 150);
    
    // Инициализация
    loadData();
    if (orbText) orbText.innerHTML = '🔮';
    
    // Генерация звёзд
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.width = Math.random() * 2 + 1 + 'px';
      star.style.height = star.style.width;
      star.style.animationDelay = Math.random() * 5 + 's';
      star.style.animationDuration = 2 + Math.random() * 4 + 's';
      starsContainer.appendChild(star);
    }
    
    console.log('🧙‍♀️ Ведьма готова отвечать на вопросы');
  })();
</script>
</body>
</html>
